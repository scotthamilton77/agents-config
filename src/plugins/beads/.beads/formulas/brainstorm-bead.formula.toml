# brainstorm-bead.formula.toml
#
# Interactive brainstorming and spec-writing for a placeholder bead.
# Produces a fully spec'd bead marked implementation-ready.
#
# Execution model: this formula is executed by the MAIN AGENT (not subagents)
# because it requires interactive conversation with the user. The exception
# is the ralf-spec-review step, which dispatches a fresh-eyes subagent.
#
# Phases:
#   0. Claim     — mark bead (and parent-chain epics) in_progress before any work
#   1. Assess    — read bead, identify gaps and questions
#   2. Discuss   — interactive session with user (brainstorming skill)
#   3. Write     — produce spec and acceptance criteria
#   4. Review    — RALF fresh-eyes adversarial review of the spec document
#   5. Finalize  — address findings, mark bead implementation-ready
#
# Usage:
#   bd mol wisp create brainstorm-bead --var bead-id=proj-42 --var title-slug=add-rate-limiting
#   bd mol current <wisp-id>   # shows steps with status

formula     = "brainstorm-bead"
description = "Interactive spec-writing: assess gaps → discuss with user → write spec → RALF spec review → mark implementation-ready"
type        = "workflow"
phase       = "vapor"
pour        = true
version     = 1

[vars.bead-id]
description = "Bead ID to brainstorm (e.g. proj-42). Must already exist."
required    = true

[vars.title-slug]
description = "Kebab-cased slug derived from the source bead/feature title (≤30 chars). Used to make step-bead titles human-readable and source-identifiable."
required    = true

# =============================================================================
# Phase 0: Claim
# =============================================================================

[[steps]]
id    = "claim"
title = "[claim] {{title-slug}}"
description = """
Mark this bead (and any parent-chain epics) in_progress before any work.

  ~/.beads/scripts/bd-claim-walk.sh --bead-id {{bead-id}}

The claim walk marks this bead and all ancestor epics in_progress.
Read the `walked=N` output to confirm the chain depth.
"""

# =============================================================================
# Phase 1: Assess
# =============================================================================

[[steps]]
id    = "assess"
title = "[assess] {{title-slug}}"
needs = ["claim"]
description = """
Read the bead fully. Understand what it is and what's unclear.

  bd show {{bead-id}}

Identify:
- What is the core problem or goal?
- What requirements are stated vs. implied vs. missing?
- What acceptance criteria exist (if any)?
- What architectural or integration questions are unresolved?
- What constraints (tech, product, time) apply?
- What are the likely edge cases and error paths?

Prepare a list of questions for the user, applying the QUESTION FILTER:
  Only include questions where:
  (a) the answer has significant architectural or requirements implications
      not already specified in the bead or codebase, OR
  (b) there are conflicting directions that require human resolution.
  Decide everything else yourself. Do NOT include questions you can
  answer from the codebase, existing instructions, or standard
  engineering judgment.

If the bead is already fully specified (no real questions remain), skip
to write-spec. This step can complete quickly if the bead is well-written.
"""

# =============================================================================
# Phase 2: Discuss
# =============================================================================

[[steps]]
id    = "discuss"
title = "[discuss] {{title-slug}}"
needs = ["assess"]
description = """
Invoke the brainstorming skill for an interactive design conversation.

Skill: superpowers:brainstorming

Present only the filtered questions from the assess step. Work through them
with the user collaboratively. Let the conversation evolve — new questions
may emerge as answers are given.

QUESTION FILTER reminder (applies throughout this conversation):
  Ask only when the answer has significant architectural/requirements
  implications, or when there is conflicting direction. Decide everything
  else yourself. Do NOT ask questions the user shouldn't need to answer.

By the end of this step, you should have clear answers to:
- What the feature/fix does and doesn't do
- Who uses it and how
- Acceptance criteria (specific, testable)
- Key design decisions and their rationale
- Out-of-scope items explicitly called out

ESCALATION CHECKLIST — before proceeding to write-spec:
  [ ] All critical questions answered?          NO → continue discussing
  [ ] Acceptance criteria clear and testable?   NO → clarify with user
  [ ] Scope boundaries agreed?                  NO → clarify with user
  [ ] Otherwise: PROCEED
"""

# =============================================================================
# Phase 3: Write Spec
# =============================================================================

[[steps]]
id    = "write-spec"
title = "[write-spec] {{title-slug}}"
needs = ["discuss"]
description = """
Produce a complete spec and write it back to the bead.

Write the spec as a structured document covering:
- Summary: what this does in 1-3 sentences
- Background / motivation: why this is needed
- Requirements: the must-haves
- Out of scope: what this explicitly does NOT do
- Acceptance criteria: specific, testable conditions for done
- Design notes: key decisions made during brainstorming
- Open questions: anything still unresolved (if any)

Write back to the bead:

⚠️ Before writing: `--notes=` REPLACES the entire notes field, and
`--acceptance=` REPLACES the entire acceptance-criteria field. Inspect
the current state with `bd show {{bead-id}}` first. If the bead has
prior investigation context (notes from `create-bead`, user discussion,
or earlier brainstorming), you MUST either:
  (a) merge the prior content into your spec document before writing, or
  (b) preserve it via `bd comments add {{bead-id}} "..."` BEFORE running
      the update commands below.

  bd update {{bead-id}} --acceptance="<one line per acceptance criterion>"
  bd update {{bead-id}} --notes="<full spec document>"

If the spec required closing existing technical ambiguity, record it:
  ~/.beads/scripts/bd-record-decision.sh \\
    --bead-id {{bead-id}} \\
    --title "<brief decision statement>" \\
    --notes "<rationale>" \\
    # choose one:
    --implemented      # decision resolved in this spec; closes the decision bead
    --needs-approval   # impacts future work; keeps open and flags for human review

Do NOT start implementing. Do NOT create a worktree. This is a spec step.
"""

# =============================================================================
# Phase 4: RALF Spec Review
# =============================================================================

[[steps]]
id    = "ralf-spec-review"
title = "[ralf-spec-review] {{title-slug}}"
needs = ["write-spec"]
description = """
Dispatch `ralf-review` against the finalized spec text from this bead.

Skill: ralf-review
Inputs:
- target artifact: current spec and acceptance criteria from `bd show {{bead-id}}`
- review criteria: completeness, ambiguity, feasibility, consistency, and implementability
- context: discussion notes, known constraints, parent/child bead context, and relevant repo conventions
- max cycles: 3

`ralf-review` runs bounded adversarial fresh-eyes cycles against the provided spec text.
It does not read or mutate beads; this formula step supplies all inputs and decides how
to act on the structured report.

Review reported findings:
- if findings are valid and actionable, return to write-spec and revise
- if findings are non-significant, proceed

Run at most 3 spec-review cycles. If critical or blocking issues remain, stop
and inform the user if in interactive mode, else flag the bead for human intervention
(add the human label), capture the state of the review and the outstanding issues, and
stop. Otherwise for non-blocking and non-critical concerns that remain after cycle
cap, document them explicitly as open questions in the bead notes.
"""

# =============================================================================
# Phase 5: Finalize — produce net-new implementation bead Y, close source X
# =============================================================================
#
# Phase 5 produces a NEW implementation bead Y at finalize time and CLOSES the
# source seed bead X. X carries the brainstorming history as a frozen historical
# record; Y carries the spec, formula choice, ralf labels, readiness markers,
# and follow-up children. See docs/plans/2026-05-07-brainstorm-bead-x-to-y-redesign.md
# for the full design rationale.
#
# Key invariants:
#   - Y inherits X.parent (epic hierarchy carries through)
#   - Y links back to X via `discovered-from` dep + `produced-from-<X-id>` label
#   - X carries `produced-bead-<Y-id>` label as the canonical replay-safe marker
#   - X is closed with reason "brainstormed; produced <Y-id>"
#   - Re-running finalize is idempotent at every boundary

[[steps]]
id    = "finalize"
title = "[finalize] {{title-slug}}"
needs = ["ralf-spec-review"]
description = """
Produce a net-new implementation bead Y from the brainstormed spec on X,
then close X. Steps below MUST be executed in order — the order is chosen
so any failure leaves a recoverable state for replay.

Throughout this step, `<X-id>` = `{{bead-id}}` (the source seed bead) and
`<Y-id>` = the id of the new implementation bead created in step 4.

At the top of this step's script execution, set:

  TITLE_SLUG="{{title-slug}}"

──────────────────────────────────────────────────────────────────────────
STEP 0 — Container gate (runs BEFORE Step 1 idempotency probe)
──────────────────────────────────────────────────────────────────────────

Container beads (milestone / epic / feature-with-children) must NOT produce
an implementation bead Y. Containers are excluded from impl-ready and
brainstorm-ready lists, and brainstorm-bead MUST NOT stamp
`implementation-ready` or `brainstormed` on a container. The full
routing spec — the three rules and the type × children × labels filter
matrix — lives in the `whats-next` skill's `collect.py` module-level
documentation. Decomposition produces leaf children directly via
`bd create --parent`; this finalize path then exits cleanly.

The detection + HEP / decomposition logic lives in the helper script
`~/.beads/scripts/bd-finalize-container-gate.sh`. The helper handles:
container detection (milestone | epic | feature-with-children — probes
non-closed children via `bd list --parent ... --status open,in_progress`);
HEP escalation for prior-run state (forward `produced-bead-<Y>` AND
reverse `produced-from-<X>` orphan probes); clean decomposition outcome
(stamps `epic-decomposed`, runs the I2 close-walk, burns the wisp).
On HEP paths it creates child-only escalations and skips the cross-type
`bd dep add` for container sources, including epic/milestone and
feature-with-children cases (the bd `blocks` epic wall hard-errors on
cross-type edges; the Rule B structural filter in the whats-next skill
already gates containers out of any queue).

  # ── STEP 0: Container gate ───────────────────────────────────────────
  DECISION=$(~/.beads/scripts/bd-finalize-container-gate.sh \\
    --bead-id "{{bead-id}}" \\
    --mol-id "<this-mol-id>")
  case "$DECISION" in
    handled)        exit 0 ;;   # HEP escalation OR clean decomposition done
    not-container)  ;;          # fall through to Step 1 (idempotency probe → ...)
    *) echo "ERROR: bd-finalize-container-gate.sh returned unexpected decision: $DECISION" >&2
       exit 1 ;;
  esac

Note on naming scope: $TITLE_SLUG is used ONLY for children created UNDER Y
(post-Y), namely the `[merge-gate] $TITLE_SLUG` child in step 5b and the
`[verify] $TITLE_SLUG - $ac_line` children in step 5b. The pre-Y
escalation beads created in steps 1 and 2 (titled "Manual triage: ...")
are intentionally excluded from the slug convention — they are diagnostic
HEP (halt-exit-pause) beads addressed to a human triager, not part of Y's
work breakdown, so they keep human-readable diagnostic titles instead of
an `[escalate] <slug>` form. There is no post-Y `[escalate]` child path
in this formula.

──────────────────────────────────────────────────────────────────────────
STEP 1 — Pre-flight idempotency probe
──────────────────────────────────────────────────────────────────────────

Detect prior partial runs before doing any new writes.

  # 1a. Has X already been stamped with a produced-bead-* marker?
  # Collect into JSON array so we can detect >1 without silently dropping extras.
  PRODUCED_LABELS=$(bd label list {{bead-id}} --json \\
    | jq -c '[.[] | select(startswith("produced-bead-"))]')
  PRODUCED_COUNT=$(echo "$PRODUCED_LABELS" | jq 'length')

  if [ "$PRODUCED_COUNT" -gt 1 ]; then
    # HEP: multiple produced-bead-* labels — ambiguous canonical Y; escalate.
    X_PRIORITY_ESC=$(bd show {{bead-id}} --json | jq -r '.[0].priority // "2"')
    ESC_ID=$(bd create --type task --priority "$X_PRIORITY_ESC" \\
      --title "Manual triage: multiple produced-bead labels on {{bead-id}}" \\
      --description "finalize halted: $PRODUCED_COUNT produced-bead-* labels found on {{bead-id}}; cannot determine canonical Y. Remove all but the correct produced-bead-<Y-id> label and re-run finalize." \\
      --labels "human" --no-inherit-labels \\
      --json | jq -r 'if type == "array" then .[0].id else .id end // empty')
    if [[ -z "$ESC_ID" || "$ESC_ID" == "null" ]]; then
        echo "Error: could not extract escalation bead id (multiple produced-bead labels path)" >&2
        exit 1
    fi
    bd dep add {{bead-id}} "$ESC_ID"
    echo "PAUSED: multiple produced-bead-* labels on {{bead-id}}; escalation bead $ESC_ID created. Resolve $ESC_ID to resume."
    exit 0
  fi

  PRODUCED_MARKER=$(echo "$PRODUCED_LABELS" | jq -r '.[0] // empty')

  if [ -n "$PRODUCED_MARKER" ]; then
    # X has been stamped by a prior run. Extract the existing Y-id from the
    # label suffix and skip ahead to step 8 (close X + I2 close-walk) and
    # step 9 (burn wisp). Steps 2-7 are already done.
    Y_CONTAINER_ID="${PRODUCED_MARKER#produced-bead-}"
    echo "Replay: produced-bead-$Y_CONTAINER_ID already on {{bead-id}}; resuming at step 8."
    # Derive Y_IMPL_ID from Y_container's children with produced-from-{{bead-id}} label.
    Y_IMPL_ID=$(bd list --parent "$Y_CONTAINER_ID" \
      --label "produced-from-{{bead-id}}" --json \
      | jq -r '[.[] | select(.status != "closed")] | .[0].id // empty')
    [ -z "$Y_IMPL_ID" ] && Y_IMPL_ID=$(bd list --parent "$Y_CONTAINER_ID" \
      --label "produced-from-{{bead-id}}" --json \
      | jq -r '.[0].id // empty')
    # Derive CHOSEN and SID from Y_impl's labels (step 3 was skipped on this replay path).
    CHOSEN=$(bd label list "$Y_IMPL_ID" --json | jq -r '.[] | select(startswith("formula-"))' | sed 's/^formula-//')
    SID=$(bd label list "$Y_IMPL_ID" --json | jq -r '.[] | select(startswith("implementation-readied-session-"))' | sed 's/^implementation-readied-session-//')
    # GOTO step 8.
  else
    # 1b. No produced-bead marker. Probe for an orphan Y from a run that
    # crashed AFTER step 4 (Y created) but BEFORE step 7 (X stamped).
    ORPHAN_Y=$(bd list --label produced-from-{{bead-id}} --json \\
      | jq '[.[] | select(.status != "closed")]')
    ORPHAN_COUNT=$(echo "$ORPHAN_Y" | jq 'length')

    case "$ORPHAN_COUNT" in
      0) ;;  # fresh run; proceed to step 2
      1) Y_IMPL_ID=$(echo "$ORPHAN_Y" | jq -r '.[0].id')
         Y_CONTAINER_ID=$(bd show "$Y_IMPL_ID" --json | jq -r '.[0].parent // empty')
         echo "Replay: orphan Y_IMPL_ID=$Y_IMPL_ID (Y_CONTAINER_ID=$Y_CONTAINER_ID) found (produced-from-{{bead-id}}); resuming at step 5."
         # Re-fetch X fields needed by step 5+ (step 3 is skipped on this path).
         X_JSON_R=$(bd show {{bead-id}} --json)
         X_PRIORITY=$(echo "$X_JSON_R" | jq -r '.[0].priority')
         X_AC=$(echo "$X_JSON_R"      | jq -r '.[0].acceptance_criteria // ""')
         # Derive CHOSEN and SID from Y_impl's labels for use in step 9 report.
         CHOSEN=$(bd label list "$Y_IMPL_ID" --json | jq -r '.[] | select(startswith("formula-"))' | sed 's/^formula-//')
         SID=$(bd label list "$Y_IMPL_ID" --json | jq -r '.[] | select(startswith("implementation-readied-session-"))' | sed 's/^implementation-readied-session-//')
         # GOTO step 5 with the existing Y_CONTAINER_ID / Y_IMPL_ID.
         ;;
      *) # HEP: create escalation bead + blocking dep; exit 0 so bd ready gating works.
         X_PRIORITY_ESC=$(bd show {{bead-id}} --json | jq -r '.[0].priority // "2"')
         ESC_ID=$(bd create --type task --priority "$X_PRIORITY_ESC" \\
           --title "Manual triage: $ORPHAN_COUNT orphan Y beads for {{bead-id}}" \\
           --description "finalize halted: $ORPHAN_COUNT non-closed beads carry label produced-from-{{bead-id}}. Determine the canonical Y, close or delete the others, then re-run finalize." \\
           --labels "human" --no-inherit-labels \\
           --json | jq -r 'if type == "array" then .[0].id else .id end // empty')
         if [[ -z "$ESC_ID" || "$ESC_ID" == "null" ]]; then
             echo "Error: could not extract escalation bead id (orphan Y candidates path)" >&2
             exit 1
         fi
         bd dep add {{bead-id}} "$ESC_ID"
         echo "PAUSED: multiple orphan Y candidates for {{bead-id}}; escalation bead $ESC_ID created. Resolve $ESC_ID to resume."
         exit 0 ;;
    esac
  fi

  # IMPORTANT: do NOT pass `--type *` to bd list — `*` is rejected as
  # `invalid issue type "*"`. Omitting --type matches all types, which is
  # the intended behavior for the orphan probe above.

──────────────────────────────────────────────────────────────────────────
STEP 2 — Pre-flight children check
──────────────────────────────────────────────────────────────────────────

Classify X's existing children against the §4 allowlist. Any non-allowlisted
child halts finalize for human triage.

  CHILDREN_JSON=$(bd list --parent={{bead-id}} --json)

  # Allowlist: child carries label `merge-gate`, OR child carries label
  # `human` (representing a [Human verify] follow-up). Anything else is
  # unexpected.
  UNEXPECTED=$(echo "$CHILDREN_JSON" \\
    | jq -r '[.[] | select(.status != "closed")
                  | select((.labels | index("merge-gate") | not)
                          and (.labels | index("human") | not))
                  | .id] | join(",")')

  if [ -n "$UNEXPECTED" ]; then
    # HEP: create escalation bead + blocking dep; exit 0 so bd ready gating works.
    X_PRIORITY_ESC=$(bd show {{bead-id}} --json | jq -r '.[0].priority // "2"')
    ESC_ID=$(bd create --type task --priority "$X_PRIORITY_ESC" \\
      --title "Manual triage: unexpected children on {{bead-id}}" \\
      --description "finalize halted: {{bead-id}} has unexpected non-formula children [$UNEXPECTED]. Triage or close these children, then re-run finalize." \\
      --labels "human" --no-inherit-labels \\
      --json | jq -r 'if type == "array" then .[0].id else .id end // empty')
    if [[ -z "$ESC_ID" || "$ESC_ID" == "null" ]]; then
        echo "Error: could not extract escalation bead id (unexpected children path)" >&2
        exit 1
    fi
    bd dep add {{bead-id}} "$ESC_ID"
    echo "PAUSED: unexpected children on {{bead-id}}; escalation bead $ESC_ID created. Resolve $ESC_ID to resume."
    exit 0
  fi

──────────────────────────────────────────────────────────────────────────
STEP 3 — Compute Y's fields (interactive: RALF triage + formula selection)
──────────────────────────────────────────────────────────────────────────

Compute the values that go into the atomic `bd create` call in step 4. The
RALF triage and formula-selection prompt remain interactive (main agent in
the brainstorm session) — they only differ from the old design in that the
resulting labels are applied to Y via step 4's --labels, not to X.

3a. Read X's identity fields:

  X_JSON=$(bd show {{bead-id}} --json)
  X_TITLE=$(echo "$X_JSON" | jq -r '.[0].title')
  X_PRIORITY=$(echo "$X_JSON" | jq -r '.[0].priority')
  X_PARENT=$(echo "$X_JSON"  | jq -r '.[0].parent // empty')
  X_NOTES=$(echo "$X_JSON"   | jq -r '.[0].notes // ""')
  X_AC=$(echo "$X_JSON"      | jq -r '.[0].acceptance_criteria // ""')
  X_TYPE=$(echo "$X_JSON"    | jq -r '.[0].issue_type // "task"')

3b. Compute Y's title with idempotent guard against double-prefix on replay:

  # Defensive trim — leading whitespace would otherwise let the case below
  # fall through and double-prefix.
  X_TITLE_TRIMMED=$(printf %s "$X_TITLE" | awk '{$1=$1; print}')
  case "$X_TITLE_TRIMMED" in
    '[Impl] '*) Y_TITLE="$X_TITLE_TRIMMED" ;;     # already prefixed; replay-safe
    *)          Y_TITLE="[Impl] $X_TITLE_TRIMMED" ;;
  esac

3c. RALF triage — recompute fresh; do NOT carry X's stale ralf:* labels:

  # Reset locals (X's ralf:* labels are NEVER copied to Y; the deny-list in
  # §6.1 enforces this on the label-copy path in step 3f).
  RALF_REQUIRED=""
  RALF_CYCLES=""

  # Apply RALF heuristic: stamp ralf:required if the spec warrants iterative
  # refinement. Triggers (any one is sufficient):
  #   - more than a few lines in a single file
  #   - multi-file coordinated change
  #   - security-sensitive code
  #   - authentication/authorization
  #   - payment processing
  #   - data migration
  #   - architectural shift
  #   - explicit user directive for RALF
  # The agent decides based on the final spec text. If yes:
  #   RALF_REQUIRED="ralf:required"
  # Optional cycle override (only when justified):
  #   RALF_CYCLES="ralf:cycles=N"

3d. Formula selection heuristic + interactive confirm/override:

  m_count=$(printf %s "$X_AC" \\
    | grep -cvE '^([[:space:]]*$|\\[h\\][[:space:]])')
  # Section-body extraction: range pattern /^\\[gates\\]/,/^\\[/ is a no-op
  # (the [gates] header satisfies BOTH boundaries on the same line). Use a
  # flag-based parser instead.
  test_runner=$(awk '/^\\[gates\\]/{flag=1;next} /^\\[/{flag=0} flag' project-config.toml \\
    | awk -F'=' '/^test[[:space:]]*=/{sub(/#.*$/,"",$2); gsub(/[[:space:]"\\047]/,"",$2); print $2}')

  if [ "$m_count" = "0" ] || [ -z "$test_runner" ]; then
    PROPOSED="docs-only"
    if [ "$m_count" = "0" ] && [ -z "$test_runner" ]; then
      REASON="no [m] AC lines AND no test runner"
    elif [ "$m_count" = "0" ]; then
      REASON="no [m] AC lines"
    else
      REASON="no test runner ([gates].test=='')"
    fi
  elif [ "$X_TYPE" = "bug" ]; then
    PROPOSED="fix-bug"
    REASON="bug type with [m] ACs and test runner"
  else
    PROPOSED="implement-feature"
    REASON="${X_TYPE} with [m] ACs and test runner"
  fi

  # Interactive prompt — re-prompt on invalid input; do NOT stamp until valid:
  #   "Proposed formula: ${PROPOSED} (${REASON}).
  #    Confirm or override [docs-only|implement-feature|fix-bug]:"
  # Bare confirm → ${PROPOSED}; otherwise use typed value.
  # Loop until CHOSEN is one of: docs-only | implement-feature | fix-bug.
  CHOSEN="<INTERACTIVE_REQUIRED:formula-selection>"  # main agent MUST replace via interactive prompt
  # If CHOSEN still contains "<INTERACTIVE_REQUIRED" at finalize time, abort with explicit error
  # (the case statement in 3e will fall through to no Y_TYPE assignment, and step 4's
  # bd create will fail on empty --type — but better to fail loudly here):
  case "$CHOSEN" in
    '<INTERACTIVE_REQUIRED'*) echo "ERROR: formula selection placeholder not replaced by interactive prompt"; exit 1 ;;
  esac

3e. Derive Y's `type` from CHOSEN:

  case "$CHOSEN" in
    implement-feature) Y_TYPE="feature" ;;
    fix-bug)           Y_TYPE="bug" ;;
    docs-only)         Y_TYPE="task" ;;
  esac

3f. Compute custom-label set to copy X→Y (filtered through §6.1 deny-list):

  # Deny-list regex (extended-regex):
  #   ^(brainstormed|implementation-ready|implementation-readied-session-.*|formula-.*|produced-(from|bead)-.*|for-bead-.*|ralf:.*|merge-gate|human)$
  COPY_LABELS=$(bd label list {{bead-id}} --json \\
    | jq -r '.[]' \\
    | grep -Ev '^(brainstormed|implementation-ready|implementation-readied-session-.*|formula-.*|produced-(from|bead)-.*|for-bead-.*|ralf:.*|merge-gate|human)$' \\
    | paste -sd, -)

3g. Get current session SID prefix (first 8 hex chars of session ID):

  SID="<INTERACTIVE_REQUIRED:session-id-prefix-8-hex>"  # main agent MUST replace with first 8 hex chars of current session ID
  # Guard: if the placeholder survived to here, abort loudly rather than stamp
  # a malformed implementation-readied-session-* label that breaks start-bead Route A.
  case "$SID" in
    '<INTERACTIVE_REQUIRED'*) echo "ERROR: SID placeholder not replaced — agent must fill in first 8 hex chars of current session ID"; exit 1 ;;
  esac

3h. Assemble the full label string for Y (comma-joined, dropping empties):

  Y_LABELS="produced-from-{{bead-id}},formula-${CHOSEN},brainstormed,implementation-ready,implementation-readied-session-${SID}"
  [ -n "$RALF_REQUIRED" ] && Y_LABELS="$Y_LABELS,$RALF_REQUIRED"
  [ -n "$RALF_CYCLES" ]   && Y_LABELS="$Y_LABELS,$RALF_CYCLES"
  [ -n "$COPY_LABELS" ]   && Y_LABELS="$Y_LABELS,$COPY_LABELS"

──────────────────────────────────────────────────────────────────────────
STEP 4 — Create implementation bead via helper script (idempotent)
──────────────────────────────────────────────────────────────────────────

⚠️  CRITICAL — SEQUENTIAL CALL: Issue the script invocation below as a
SINGLE, ISOLATED tool call. Do NOT batch it with any other tool call in
the same message. The script creates the implementation bead; parallel
dispatch can produce duplicates even if everything else is correct.

Write spec and AC to temp files, then invoke the script:

  Y_SPEC=$(mktemp)
  Y_AC=$(mktemp)
  trap 'rm -f "$Y_SPEC" "$Y_AC"' EXIT
  printf %s "$X_NOTES" > "$Y_SPEC"
  printf %s "$X_AC"    > "$Y_AC"

  # Array for the optional --parent flag (avoids word-splitting on the value).
  PARENT_FLAG=()
  [ -n "$X_PARENT" ] && PARENT_FLAG=(--parent "$X_PARENT")

  HELPER_OUT=$(~/.beads/scripts/bd-finalize-create-impl-bead.sh \\
    --source-bead-id "{{bead-id}}" \\
    --type "$Y_TYPE" \\
    --priority "$X_PRIORITY" \\
    --title "$Y_TITLE" \\
    --labels "$Y_LABELS" \\
    --spec-file "$Y_SPEC" \\
    --ac-file "$Y_AC" \\
    "${PARENT_FLAG[@]}") || exit 1
  Y_CONTAINER_ID=$(echo "$HELPER_OUT" | grep '^Y_CONTAINER_ID=' | cut -d= -f2)
  Y_IMPL_ID=$(echo "$HELPER_OUT" | grep '^Y_IMPL_ID=' | cut -d= -f2)
  echo "Y_container bead: $Y_CONTAINER_ID"
  echo "Y_impl bead: $Y_IMPL_ID"

Notes on this step:

- The script outputs two KEY=VALUE lines on success (exit 0):
    Y_CONTAINER_ID=<id>
    Y_IMPL_ID=<id>
  Y_container (type=epic) is the structural parent; Y_impl (formula-derived
  type) is the executable leaf carrying all impl-ready labels.
  On failure (exit 1), it writes diagnostics to stderr. For the escalate case
  (multiple orphan impl beads), it also adds the 'human' label and an
  audit comment to {{bead-id}} before exiting — no extra bd calls needed here.
- The script handles idempotency via four states (State 3/2/1/0):
  State 3 (X has produced-bead-<id> + Y_impl has produced-from-<X_id>): emit existing IDs.
  State 2 (Y_impl exists with produced-from-<X_id> but X not stamped): resume.
  State 1 (Y_container has pending-split-<X_id> but no Y_impl): resume after creating Y_impl.
  State 0: fresh start — create Y_container then Y_impl.
- `--no-inherit-labels` (inside the script) prevents X.parent's labels
  from leaking onto Y_impl; Y_impl's labels are EXACTLY what `--labels` lists.
- I1 claim-walk: Y_container is marked in_progress by the script immediately
  after creation. Y_impl is created `open` here; it is not yet "starting work."
  The next agent (run-queue / implement-bead) that claims Y_impl will run its
  own claim-walk per I1.
- `for-bead-{{bead-id}}` molecule label staleness: the running wisp still
  bears `for-bead-{{bead-id}}` after Y is created. Step 9 burns the wisp
  immediately after step 8, so the staleness window is bounded to the
  remainder of finalize (a single agent turn). No external start-bead /
  implement-bead call can race with finalize, so no `for-bead-<Y-id>` stamp
  is needed on the doomed wisp.

──────────────────────────────────────────────────────────────────────────
STEP 5 — Create children under Y (migrate first, then fresh-create)
──────────────────────────────────────────────────────────────────────────

5a. Migrate any allowlisted pre-existing children of X to Y_container:

  # Re-fetch children: step 1's orphan-Y resume path (ORPHAN_COUNT==1, "GOTO step 5")
  # skips step 2, so CHILDREN_JSON may be unset on entry. This is idempotent and
  # cheap (one bd list call), so always re-fetch here regardless of how step 5
  # was reached.
  CHILDREN_JSON=$(bd list --parent={{bead-id}} --json)

  echo "$CHILDREN_JSON" | jq -r '.[] | select(.status != "closed")
                                     | select((.labels | index("merge-gate"))
                                             or (.labels | index("human")))
                                     | .id' \\
  | while read -r child_id; do
      bd update "$child_id" --parent "$Y_CONTAINER_ID"

      # If this is a merge-gate child whose title uses either legacy naming
      # pattern, rename it to the new "[merge-gate] $TITLE_SLUG" format.
      # Dual-probe covers BOTH legacy patterns being renamed:
      #   - "merge-{{bead-id}}" (older X-id-based title from pre-rename formula)
      #   - "merge-$Y_CONTAINER_ID" (Y_container-id-based title)
      # Future readers: both legacy formats are intentionally matched so this
      # guard handles repos that may carry either historical title.
      child_labels=$(bd label list "$child_id" --json | jq -r '.[]')
      child_title=$(bd show "$child_id" --json | jq -r '.[0].title')
      if echo "$child_labels" | grep -qx 'merge-gate' \\
        && { [ "$child_title" = "merge-{{bead-id}}" ] || [ "$child_title" = "merge-$Y_CONTAINER_ID" ]; }; then
        bd update "$child_id" --title "[merge-gate] $TITLE_SLUG"
      fi
    done

5b. Fresh-create what's still missing under Y_container (sibling to Y_impl):

  # Probe for merge-gate child under Y_container; create only if absent.
  # Dual-probe idempotency: the label-based probe covers BOTH old pattern
  # "merge-{{bead-id}}" AND new pattern "[merge-gate] $TITLE_SLUG" because
  # all merge-gate children carry the merge-gate label regardless of title format.
  EXISTING_GATE=$(bd list --parent "$Y_CONTAINER_ID" --label merge-gate --json \\
    | jq 'length')
  if [ "$EXISTING_GATE" = "0" ]; then
    bd create --type task --priority "$X_PRIORITY" --parent "$Y_CONTAINER_ID" \\
      --title "[merge-gate] $TITLE_SLUG" \\
      --description "Merge gate child for $Y_CONTAINER_ID. Closed only by merge-and-cleanup after merge + branch/worktree cleanup." \\
      --labels "merge-gate" \\
      --no-inherit-labels
  fi

  # For each [h] AC line in Y_impl's acceptance_criteria, ensure exactly one
  # human-verify child exists under Y_container. Iterate the AC and create only
  # what's missing.
  printf %s "$X_AC" \\
    | awk '/^\\[h\\][[:space:]]/{sub(/^\\[h\\][[:space:]]+/,""); print}' \\
    | while IFS= read -r ac_line; do
        # Probe for an existing human child by exact title match under Y_container.
        # Dual-probe idempotency: check for BOTH old pattern
        # "[Human verify] $ac_line" AND new pattern "[verify] $TITLE_SLUG - $ac_line"
        # (transition window dual-probe).
        EXISTING=$(bd list --parent "$Y_CONTAINER_ID" --label human --json \\
          | jq --arg old_title "[Human verify] $ac_line" \\
               --arg new_title "[verify] $TITLE_SLUG - $ac_line" \\
               '[.[] | select(.title == $old_title or .title == $new_title)] | length')
        if [ "$EXISTING" = "0" ]; then
          bd create --type task --priority "$X_PRIORITY" --parent "$Y_CONTAINER_ID" \\
            --title "[verify] $TITLE_SLUG - $ac_line" \\
            --description "Human verification required for: $ac_line" \\
            --labels "human" \\
            --no-inherit-labels
        fi
      done

──────────────────────────────────────────────────────────────────────────
STEP 6 — Migrate edges from X to Y per §3 mechanical rubric
──────────────────────────────────────────────────────────────────────────

For each dep edge involving X (in BOTH directions — outbound X→OTHER and
inbound OTHER→X — excluding the parent-child edge, already preserved via
Y.parent = X.parent), apply the rubric:

  | dep_type                                                                 | linked status         | action          |
  |--------------------------------------------------------------------------|-----------------------|-----------------|
  | blocks, blocked-by                                                       | any                   | migrate to Y    |
  | tracks, until, caused-by, validates, relates-to, supersedes              | any                   | migrate to Y    |
  | discovered-from, related                                                 | linked is closed      | keep on X       |
  | discovered-from, related                                                 | linked is open / wip  | migrate to Y    |

"Linked bead" = the bead at the other end of the edge from X's perspective
(the target for outbound, the source for inbound).

The `Y discovered-from {{bead-id}}` edge is already in place from step 4
(`--deps discovered-from:{{bead-id}}`); the helper detects and skips it
on the inbound leg, so it is never re-added.

Cost bound: O(N_out + N_in) — exactly two `bd dep list` calls capture all
edges and their statuses inline via the `.status` field. No per-edge
`bd show` status calls. Plus O(N_migrated) `bd dep add` / `bd dep remove`
pairs. Typical total << 40 bd calls. The helper is fully idempotent —
already-migrated edges no longer appear in X's dep list (in either
direction), so a replay is a no-op for them.

  ~/.beads/scripts/bd-migrate-deps.sh \\
    --source "{{bead-id}}" \\
    --target "$Y_IMPL_ID"

──────────────────────────────────────────────────────────────────────────
STEP 7 — Stamp produced-bead-<Y-id> on X (replay-safe boundary)
──────────────────────────────────────────────────────────────────────────

The label is the canonical replay-safe marker — set it BEFORE the
breadcrumb comment so a comment failure does not block forward progress.

  bd label add {{bead-id}} "produced-bead-$Y_CONTAINER_ID"

  # Best-effort breadcrumb (comment failure does NOT block step 8):
  TODAY=$(date -u +%Y-%m-%d)
  bd comments add {{bead-id}} "Brainstormed; produced container=$Y_CONTAINER_ID impl=$Y_IMPL_ID on $TODAY" \\
    || echo "WARN: comment breadcrumb failed; continuing (label is the canonical marker)."

──────────────────────────────────────────────────────────────────────────
STEP 8 — Close X with reason; run I2 close-walk
──────────────────────────────────────────────────────────────────────────

  ~/.beads/scripts/bd-close-walk.sh \\
    --bead-id "{{bead-id}}" \\
    --reason "brainstormed; produced Y_container=$Y_CONTAINER_ID Y_impl=$Y_IMPL_ID"

  # The I2 ancestor walk halts at X.parent because Y_container is now an open
  # child of X.parent (Y_container.parent = X.parent) — the epic still has
  # active work via Y_container → Y_impl.
  # Read the `closed=...` output for the audit trail.

──────────────────────────────────────────────────────────────────────────
STEP 9 — Burn the wisp; report hand-off
──────────────────────────────────────────────────────────────────────────

  bd mol burn <this-mol-id> --force

Report to the user:
  "Brainstorming complete for {{bead-id}} (now closed).
   Y_container (epic, structural parent): $Y_CONTAINER_ID
   Y_impl (implementation bead): $Y_IMPL_ID — labels: brainstormed, implementation-ready,
   formula-${CHOSEN}, implementation-readied-session-${SID}.
   Default hand-off is to run-queue (separate session). Continuing to
   implementation in this session requires explicit authorization."

STOP unless the user explicitly authorizes immediate implementation in the
current session.
"""
