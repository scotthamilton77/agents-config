# brainstorm-bead.formula.toml
#
# Interactive brainstorming and spec-writing for a placeholder bead.
# Produces a fully spec'd bead marked implementation-ready.
#
# Execution model: this formula is executed by the MAIN AGENT (not subagents)
# because it requires interactive conversation with the user. The exception
# is the ralf-spec-review step, which dispatches a fresh-eyes subagent.
#
# Phases:
#   0. Claim     — mark bead (and parent-chain epics) in_progress before any work
#   1. Assess    — read bead, identify gaps and questions
#   2. Discuss   — interactive session with user (brainstorming skill)
#   3. Write     — produce spec and acceptance criteria
#   4. Review    — RALF fresh-eyes adversarial review of the spec document
#   5. Finalize  — address findings, mark bead implementation-ready
#
# Usage:
#   bd mol wisp create brainstorm-bead --var bead-id=proj-42
#   bd mol current <wisp-id>   # shows steps with status

formula     = "brainstorm-bead"
description = "Interactive spec-writing: assess gaps → discuss with user → write spec → RALF spec review → mark implementation-ready"
type        = "workflow"
phase       = "vapor"
pour        = true
version     = 1

[vars.bead-id]
description = "Bead ID to brainstorm (e.g. proj-42). Must already exist."
required    = true

# =============================================================================
# Phase 0: Claim
# =============================================================================

[[steps]]
id    = "claim"
title = "Claim bead and parent-chain epics"
description = """
Mark this bead (and any parent-chain epics) in_progress before any work.
Brainstorming IS work — the bead's status must reflect that, so that
`bd ready` and `bd list --status=open` never show a bead that is
actively being brainstormed as 'available'.

  bd update {{bead-id}} --status in_progress

Walk the parent chain and mark each ancestor epic in_progress (stops
when there is no parent):

  PARENT=$(bd show {{bead-id}} --json | jq -r '.[0].parent // empty')
  while [ -n "$PARENT" ]; do
    bd update "$PARENT" --status in_progress
    PARENT=$(bd show "$PARENT" --json | jq -r '.[0].parent // empty')
  done

The claim is cheap even if `assess` later decides the bead needs no
further brainstorming.
"""

# =============================================================================
# Phase 1: Assess
# =============================================================================

[[steps]]
id    = "assess"
title = "Assess: read bead, identify what's missing"
needs = ["claim"]
description = """
Read the bead fully. Understand what it is and what's unclear.

  bd show {{bead-id}}

Identify:
- What is the core problem or goal?
- What requirements are stated vs. implied vs. missing?
- What acceptance criteria exist (if any)?
- What architectural or integration questions are unresolved?
- What constraints (tech, product, time) apply?
- What are the likely edge cases and error paths?

Prepare a list of questions for the user, applying the QUESTION FILTER:
  Only include questions where:
  (a) the answer has significant architectural or requirements implications
      not already specified in the bead or codebase, OR
  (b) there are conflicting directions that require human resolution.
  Decide everything else yourself. Do NOT include questions you can
  answer from the codebase, existing instructions, or standard
  engineering judgment.

If the bead is already fully specified (no real questions remain), skip
to write-spec. This step can complete quickly if the bead is well-written.
"""

# =============================================================================
# Phase 2: Discuss
# =============================================================================

[[steps]]
id    = "discuss"
title = "Discuss: interactive brainstorming session with user"
needs = ["assess"]
description = """
Invoke the brainstorming skill for an interactive design conversation.

Skill: superpowers:brainstorming

Present only the filtered questions from the assess step. Work through them
with the user collaboratively. Let the conversation evolve — new questions
may emerge as answers are given.

QUESTION FILTER reminder (applies throughout this conversation):
  Ask only when the answer has significant architectural/requirements
  implications, or when there is conflicting direction. Decide everything
  else yourself. Do NOT ask questions the user shouldn't need to answer.

By the end of this step, you should have clear answers to:
- What the feature/fix does and doesn't do
- Who uses it and how
- Acceptance criteria (specific, testable)
- Key design decisions and their rationale
- Out-of-scope items explicitly called out

ESCALATION CHECKLIST — before proceeding to write-spec:
  [ ] All critical questions answered?          NO → continue discussing
  [ ] Acceptance criteria clear and testable?   NO → clarify with user
  [ ] Scope boundaries agreed?                  NO → clarify with user
  [ ] Otherwise: PROCEED
"""

# =============================================================================
# Phase 3: Write Spec
# =============================================================================

[[steps]]
id    = "write-spec"
title = "Write spec and acceptance criteria to bead"
needs = ["discuss"]
description = """
Produce a complete spec and write it back to the bead.

Write the spec as a structured document covering:
- Summary: what this does in 1-3 sentences
- Background / motivation: why this is needed
- Requirements: the must-haves
- Out of scope: what this explicitly does NOT do
- Acceptance criteria: specific, testable conditions for done
- Design notes: key decisions made during brainstorming
- Open questions: anything still unresolved (if any)

Write back to the bead:
  bd update {{bead-id}} --acceptance="<one line per acceptance criterion>"
  bd update {{bead-id}} --notes="<full spec document>"

If the spec required closing existing technical ambiguity, note it:
  bd decision record --title="<decision>" --notes="<rationale>"

Do NOT start implementing. Do NOT create a worktree. This is a spec step.
"""

# =============================================================================
# Phase 4: RALF Spec Review
# =============================================================================

[[steps]]
id    = "ralf-spec-review"
title = "Adversarial spec review: dispatch ralf-review"
needs = ["write-spec"]
description = """
Dispatch `ralf-review` against this bead's spec target.

Skill: ralf-review
Target: {{bead-id}}

`ralf-review` runs bounded adversarial fresh-eyes cycles against the spec
(completeness, ambiguity, feasibility, consistency).

Review reported findings:
- if findings are valid and actionable, return to write-spec and revise
- if findings are non-significant, proceed

Run at most 2 spec-review cycles. If concerns remain after cycle cap,
document them explicitly as open questions in the bead notes.
"""

# =============================================================================
# Phase 5: Finalize
# =============================================================================

[[steps]]
id    = "finalize"
title = "Finalize: apply review findings, triage RALF, mark implementation-ready"
needs = ["ralf-spec-review"]
description = """
Incorporate valid spec-review findings, perform RALF triage, then mark ready.

1. Update bead acceptance + notes with final spec revisions:
     bd update {{bead-id}} --acceptance="<revised criteria>"
     bd update {{bead-id}} --notes="<revised spec>"

2. RALF triage — if implementation risk warrants iterative refinement,
   stamp RALF labels.

   If the spec involves any of the following:
   - security-sensitive code
   - authentication/authorization
   - payment processing
   - data migration
   - architectural shift
   - multi-file coordinated change
   - explicit user directive for RALF

   then:
     bd label add {{bead-id}} ralf:required

   Optional cycle override (when a non-default cycle count is justified):
     bd label remove {{bead-id}} ralf:cycles=*
     bd label add {{bead-id}} ralf:cycles=N

3. Add standard readiness labels:
     bd label add {{bead-id}} brainstormed
     bd label add {{bead-id}} implementation-ready
     bd label add {{bead-id}} implementation-readied-session-<sid>

4. Report implementation-ready hand-off and stop unless user explicitly
   authorizes immediate implementation in the current session.

5. Burn this wisp:
     bd mol burn <this-mol-id>
"""
