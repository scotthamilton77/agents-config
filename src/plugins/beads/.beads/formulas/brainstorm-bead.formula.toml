# brainstorm-bead.formula.toml
#
# Interactive brainstorming and spec-writing for a placeholder bead.
# Produces a fully spec'd bead marked implementation-ready.
#
# Execution model: this formula is executed by the MAIN AGENT (not subagents)
# because it requires interactive conversation with the user. The exception
# is the ralf-spec-review step, which dispatches a fresh-eyes subagent.
#
# Phases:
#   0. Claim     — mark bead (and parent-chain epics) in_progress before any work
#   1. Assess    — read bead, identify gaps and questions
#   2. Discuss   — interactive session with user (brainstorming skill)
#   3. Write     — produce spec and acceptance criteria
#   4. Review    — RALF fresh-eyes adversarial review of the spec document
#   5. Finalize  — address findings, mark bead implementation-ready
#
# Usage:
#   bd mol wisp create brainstorm-bead --var bead-id=proj-42
#   bd mol current <wisp-id>   # shows steps with status

formula     = "brainstorm-bead"
description = "Interactive spec-writing: assess gaps → discuss with user → write spec → RALF spec review → mark implementation-ready"
type        = "workflow"
phase       = "vapor"
pour        = true
version     = 1

[vars.bead-id]
description = "Bead ID to brainstorm (e.g. proj-42). Must already exist."
required    = true

# =============================================================================
# Phase 0: Claim
# =============================================================================

[[steps]]
id    = "claim"
title = "Claim bead and parent-chain epics"
description = """
Mark this bead (and any parent-chain epics) in_progress before any work.
Brainstorming IS work — the bead's status must reflect that, so that
`bd ready` and `bd list --status=open` never show a bead that is
actively being brainstormed as 'available'.

  bd update {{bead-id}} --status in_progress

Walk the parent chain and mark each ancestor epic in_progress (stops
when there is no parent):

  PARENT=$(bd show {{bead-id}} --json | jq -r '.[0].parent // empty')
  while [ -n "$PARENT" ]; do
    bd update "$PARENT" --status in_progress
    PARENT=$(bd show "$PARENT" --json | jq -r '.[0].parent // empty')
  done

The claim is cheap even if `assess` later decides the bead needs no
further brainstorming.
"""

# =============================================================================
# Phase 1: Assess
# =============================================================================

[[steps]]
id    = "assess"
title = "Assess: read bead, identify what's missing"
needs = ["claim"]
description = """
Read the bead fully. Understand what it is and what's unclear.

  bd show {{bead-id}}

Identify:
- What is the core problem or goal?
- What requirements are stated vs. implied vs. missing?
- What acceptance criteria exist (if any)?
- What architectural or integration questions are unresolved?
- What constraints (tech, product, time) apply?
- What are the likely edge cases and error paths?

Prepare a list of questions for the user, applying the QUESTION FILTER:
  Only include questions where:
  (a) the answer has significant architectural or requirements implications
      not already specified in the bead or codebase, OR
  (b) there are conflicting directions that require human resolution.
  Decide everything else yourself. Do NOT include questions you can
  answer from the codebase, existing instructions, or standard
  engineering judgment.

If the bead is already fully specified (no real questions remain), skip
to write-spec. This step can complete quickly if the bead is well-written.
"""

# =============================================================================
# Phase 2: Discuss
# =============================================================================

[[steps]]
id    = "discuss"
title = "Discuss: interactive brainstorming session with user"
needs = ["assess"]
description = """
Invoke the brainstorming skill for an interactive design conversation.

Skill: superpowers:brainstorming

Present only the filtered questions from the assess step. Work through them
with the user collaboratively. Let the conversation evolve — new questions
may emerge as answers are given.

QUESTION FILTER reminder (applies throughout this conversation):
  Ask only when the answer has significant architectural/requirements
  implications, or when there is conflicting direction. Decide everything
  else yourself. Do NOT ask questions the user shouldn't need to answer.

By the end of this step, you should have clear answers to:
- What the feature/fix does and doesn't do
- Who uses it and how
- Acceptance criteria (specific, testable)
- Key design decisions and their rationale
- Out-of-scope items explicitly called out

ESCALATION CHECKLIST — before proceeding to write-spec:
  [ ] All critical questions answered?          NO → continue discussing
  [ ] Acceptance criteria clear and testable?   NO → clarify with user
  [ ] Scope boundaries agreed?                  NO → clarify with user
  [ ] Otherwise: PROCEED
"""

# =============================================================================
# Phase 3: Write Spec
# =============================================================================

[[steps]]
id    = "write-spec"
title = "Write spec and acceptance criteria to bead"
needs = ["discuss"]
description = """
Produce a complete spec and write it back to the bead.

Write the spec as a structured document covering:
- Summary: what this does in 1-3 sentences
- Background / motivation: why this is needed
- Requirements: the must-haves
- Out of scope: what this explicitly does NOT do
- Acceptance criteria: specific, testable conditions for done
- Design notes: key decisions made during brainstorming
- Open questions: anything still unresolved (if any)

Write back to the bead:

⚠️ Before writing: `--notes=` REPLACES the entire notes field, and
`--acceptance=` REPLACES the entire acceptance-criteria field. Inspect
the current state with `bd show {{bead-id}}` first. If the bead has
prior investigation context (notes from `create-bead`, user discussion,
or earlier brainstorming), you MUST either:
  (a) merge the prior content into your spec document before writing, or
  (b) preserve it via `bd comments add {{bead-id}} "..."` BEFORE running
      the update commands below.

  bd update {{bead-id}} --acceptance="<one line per acceptance criterion>"
  bd update {{bead-id}} --notes="<full spec document>"

If the spec required closing existing technical ambiguity, note it:
  bd decision record --title="<decision>" --notes="<rationale>"

Do NOT start implementing. Do NOT create a worktree. This is a spec step.
"""

# =============================================================================
# Phase 4: RALF Spec Review
# =============================================================================

[[steps]]
id    = "ralf-spec-review"
title = "Adversarial spec review: dispatch ralf-review"
needs = ["write-spec"]
description = """
Dispatch `ralf-review` against the finalized spec text from this bead.

Skill: ralf-review
Inputs:
- target artifact: current spec and acceptance criteria from `bd show {{bead-id}}`
- review criteria: completeness, ambiguity, feasibility, consistency, and implementability
- context: discussion notes, known constraints, parent/child bead context, and relevant repo conventions
- max cycles: 2

`ralf-review` runs bounded adversarial fresh-eyes cycles against the provided spec text.
It does not read or mutate beads; this formula step supplies all inputs and decides how
to act on the structured report.

Review reported findings:
- if findings are valid and actionable, return to write-spec and revise
- if findings are non-significant, proceed

Run at most 2 spec-review cycles. If concerns remain after cycle cap,
document them explicitly as open questions in the bead notes.
"""

# =============================================================================
# Phase 5: Finalize
# =============================================================================

[[steps]]
id    = "finalize"
title = "Finalize: apply review findings, triage RALF, mark implementation-ready"
needs = ["ralf-spec-review"]
description = """
Incorporate valid spec-review findings, perform RALF triage, then mark ready.

1. Update bead acceptance + notes with final spec revisions:
     bd update {{bead-id}} --acceptance="<revised criteria>"
     bd update {{bead-id}} --notes="<revised spec>"

2. RALF triage — first clear previous RALF implementation-routing labels,
   then restamp only if the final spec still warrants iterative refinement:

     bd label remove {{bead-id}} ralf:required
     for label in $(bd label list {{bead-id}} --json | jq -r '.[] | select(startswith("ralf:cycles="))'); do
       bd label remove {{bead-id}} "$label"
     done

   Note: `bd label list <id> --json` returns a flat JSON array of label
   strings, NOT an object — the jq path is `.[]`, not `.labels[]`. The
   prior pattern `.labels[]` returned empty and silently failed to remove
   stale `ralf:cycles=*` labels (pre-existing bug fixed under
   agents-config-ooun).

   Use `bd label remove` before `bd label add` because `add` only appends a
   label; it does not replace prior values. Remove `ralf:cycles=*` by listing
   matching labels first; the `bd label remove` command accepts exact labels,
   not shell-style wildcards. Use a POSIX shell loop rather than GNU-only
   `xargs -r` so the command works on macOS.

   Add `ralf:required` if the spec is likely to produce significant change,
   including:
   - more than a few lines in a single file
   - multi-file coordinated change
   - security-sensitive code
   - authentication/authorization
   - payment processing
   - data migration
   - architectural shift
   - explicit user directive for RALF

   then:
     bd label add {{bead-id}} ralf:required

   Optional cycle override (when a non-default cycle count is justified):
     bd label add {{bead-id}} ralf:cycles=N

3. Formula selection heuristic + confirm/override.

   Apply a hybrid heuristic to propose a formula, then prompt the user to
   confirm or override. Stamp the resulting `formula-<name>` label on the
   bead BEFORE the readiness labels in step 5. The label is later read by
   `implement-bead` before pour selection (per
   `bead-pipeline-architecture.md` §3 preflight and §4.2).

   a. Compute heuristic inputs from canonical sources only:

        m_count=$(bd show {{bead-id}} --json \\
          | jq -r '.[0].acceptance_criteria // ""' \\
          | grep -cvE '^([[:space:]]*$|\\[h\\][[:space:]])')
        # Section-body extraction: range pattern /^\\[gates\\]/,/^\\[/ is a no-op
        # (the [gates] header satisfies BOTH boundaries on the same line).
        # Use a flag-based parser instead.
        test_runner=$(awk '/^\\[gates\\]/{flag=1;next} /^\\[/{flag=0} flag' project-config.toml \\
          | awk -F'=' '/^test[[:space:]]*=/{gsub(/[[:space:]"\\047]/,"",$2); print $2}')
        bead_type=$(bd show {{bead-id}} --json | jq -r '.[0].issue_type // "task"')

      `m_count` MUST be counted from the `acceptance_criteria` field
      ONLY (per spec §4.1). Counting `description` would false-positive
      on `[m]` tokens in prose and false-negative on canonical (non-bullet)
      AC formats.

   b. Propose a formula:

        if [ "$m_count" = "0" ] || [ -z "$test_runner" ]; then
          PROPOSED="docs-only"
          if [ "$m_count" = "0" ] && [ -z "$test_runner" ]; then
            REASON="no [m] AC lines AND no test runner"
          elif [ "$m_count" = "0" ]; then
            REASON="no [m] AC lines"
          else
            REASON="no test runner ([gates].test=='')"
          fi
        elif [ "$bead_type" = "bug" ]; then
          PROPOSED="fix-bug"
          REASON="bug type with [m] ACs and test runner"
        else
          PROPOSED="implement-feature"
          REASON="${bead_type} with [m] ACs and test runner"
        fi

   c. Prompt the user (interactive — main agent in the brainstorm session):

        "Proposed formula: ${PROPOSED} (${REASON}).
         Confirm or override [docs-only|implement-feature|fix-bug]:"

      Default on bare confirm: ${PROPOSED}. Otherwise use the user's
      typed value. Validate against the allowed set; on invalid input,
      re-prompt rather than stamp a garbage label:

        case "${CHOSEN}" in
          docs-only|implement-feature|fix-bug) ;;
          *) echo "Invalid formula '${CHOSEN}'; expected one of [docs-only|implement-feature|fix-bug]. Try again."
             # re-run the prompt; do NOT stamp a label until a valid choice is given
             ;;
        esac

      Loop until the input matches one of the three allowed values.

   d. Remove any prior `formula-*` labels (collision avoidance per §4.2).
      Note: `bd label list <id> --json` returns a flat JSON array of label
      strings, NOT an object — the jq path is `.[]`, not `.labels[]`:

        for label in $(bd label list {{bead-id}} --json \\
          | jq -r '.[] | select(startswith("formula-"))'); do
          bd label remove {{bead-id}} "$label"
        done

   e. Stamp the user's chosen formula:

        bd label add {{bead-id}} formula-<chosen>

4. Reconcile required follow-up child beads before readiness:
   - List existing open child beads under `{{bead-id}}` that carry the `human`
     label and represent `[Human verify]` follow-ups.
   - For every acceptance-criteria line currently tagged `[h]`, ensure exactly
     one matching child bead exists under `{{bead-id}}`, label it `human`, and
     link the source criterion in the child description. These children block
     later Gate 2 closure until closed with `verified-by-human`.
   - For every existing `[Human verify]` child whose source criterion is no
     longer tagged `[h]` because it was removed, reworded, or downgraded to
     `[m]`, close it with reason "AC re-classified to [m] or removed; follow-up
     no longer needed." Then create any replacement child needed for the current
     `[h]` text. Re-running finalize with unchanged AC must be a no-op.
   - Create the merge gate child `merge-{{bead-id}}` under `{{bead-id}}` if it
     does not already exist, and label it `merge-gate`. This child is closed
     only by merge-and-cleanup after merge + branch/worktree cleanup.

5. Add standard readiness labels:
     bd label add {{bead-id}} brainstormed
     bd label add {{bead-id}} implementation-ready
     bd label add {{bead-id}} implementation-readied-session-<sid>

   `<sid>` is the first 8 hex chars of the session ID that applied
   `implementation-ready`; `start-bead` Route A uses it for same-session gating.

6. Report implementation-ready hand-off and stop unless user explicitly
   authorizes immediate implementation in the current session.

7. Burn this wisp:
     bd mol burn <this-mol-id>
"""
