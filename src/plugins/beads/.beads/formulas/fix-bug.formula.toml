# fix-bug.formula.toml
#
# Per-stage bug-fix pipeline for the bead architecture.
# Extends implement-feature with a `diagnose` stage between `preflight`
# and `red-tests` to enforce root-cause investigation before any code changes.
#
# Stage sequence:
#   preflight → diagnose → red-tests → green-loop → quality-sweep → verify-ac
#   → create-pr → review-cycle → merge-or-handoff
#
# The cardinal sin of bug fixing is patching the symptom. The `diagnose`
# stage is a hard gate: no tests are written until the root cause is identified.
#
# See: docs/specs/bead-pipeline-architecture.md §3 (diagnose stage)
#
# Usage:
#   bd mol pour fix-bug \
#     --var bug="Login fails when username contains an apostrophe" \
#     --var bead-id=proj-17

formula     = "fix-bug"
description = "Per-stage bug pipeline: preflight → diagnose → red-tests → green-loop → quality-sweep → verify-ac → create-pr → review-cycle → merge-or-handoff"
type        = "workflow"
phase       = "liquid"  # persistent across sessions
pour        = true
version     = 2

[vars.bug]
description = "Short description of the bug (e.g. 'Login fails when username contains apostrophe')"
required    = true

[vars.bead-id]
description = "Bead ID tracking this bug (e.g. proj-17). Must already exist."
required    = true

# =============================================================================
# Stage: preflight
# Model: claude-sonnet-4-6  Effort: high
# cwd: repo root (worktree does not yet exist; preflight creates it)
# =============================================================================

[[steps]]
id    = "preflight"
# name is accepted by bd (verified: bd formula show succeeds) and serves as the
# stage-role identifier used by the shell driver (bead-driver-test.sh). It mirrors
# id intentionally — id is the structural key; name is the human-readable label.
name  = "preflight"
title = "Preflight: spec validation, formula selection, worktree creation"
description = """
Validate the bug bead spec and create the worktree before any investigation.
Model: claude-sonnet-4-6  Effort: high

## Inputs
Read the bead and its labels:
  bd show {{bead-id}}
  bd label list {{bead-id}}

## Actions

1. Verify `brainstormed` and `implementation-ready` labels are present.
   If either is absent: apply human-flag protocol and exit.

2. Confirm bead type is `bug` (or formula-fix-bug label is present).
   This formula is selected for bug-class beads; a feature bead routed here
   is an error — flag-human with a clear note.

3. Read project-config.toml and verify quality-gate config.
   If [static-analysis] absent or empty: mark quality-sweep skippable.

   Coverage applicability ([coverage].applicable): if explicitly set to `false`,
   coverage does NOT apply to this project (docs-only repos, config repos, etc.).
   Skip the report-location check entirely and proceed to step 4. Record this
   by running:
     bd update <step-bead-id> --append-notes "preflight: coverage opt-out (project-config has [coverage].applicable = false) — skipped report-location check"

   Coverage report location ([coverage].report-location): only checked when
   `[coverage].applicable` is true OR absent (default). If absent OR empty
   string (i.e. `report-location = ""`): apply the human-flag protocol and
   stop this stage:
     bd label add {{bead-id}} human
     bd label add <step-bead-id> human
     bd update {{bead-id}} --append-notes "preflight: no coverage report location configured in project-config.toml"
     bd update <step-bead-id> --append-notes "preflight: no coverage report location configured — molecule parked"
   An empty string is treated the same as absent: explicit opt-out requires
   `[coverage].applicable = false` — a bare empty string is ambiguous and
   must be resolved by the human.
   Do NOT continue to worktree creation. Exit cleanly.

4. Stamp the molecule→bead lookup label if not already stamped:
   bd label add <mol-id> for-bead-{{bead-id}}

5. Create the worktree:
   Branch name: fix/{{bead-id}}-<slug-from-title>
   Location: <repo-root>/.claude/worktrees/<branch-name>
   Command:
     git worktree add .claude/worktrees/<branch> -b <branch>
   CRITICAL: the formula is already poured (this step was created by the pour).
   If worktree creation fails: squash the molecule and flag-human.

6. Stamp the worktree-path label on the molecule:
   Encoding (apply IN ORDER):  _ → _u  then  / → __
   bd label add <mol-id> worktree-path-<encoded>

7. Claim the bead and walk the parent chain:
   bd update {{bead-id}} --status in_progress
   PARENT=$(bd show {{bead-id}} --json | jq -r '.[0].parent // empty')
   while [ -n "$PARENT" ]; do
     bd update "$PARENT" --status in_progress
     PARENT=$(bd show "$PARENT" --json | jq -r '.[0].parent // empty')
   done

## Definition of Done
Poured molecule + worktree exists + worktree-path-* label stamped on molecule.
OR: human label + structured gap-note + (if pour completed) molecule squashed.

## Idempotent re-entry
Check: does an active molecule exist? Does the worktree path decode to a real
git worktree? If so, skip work already done.
"""

# =============================================================================
# Stage: diagnose
# Model: claude-sonnet-4-6  Effort: high
# cwd: worktree (decoded from worktree-path-* label)
#
# This stage is SPECIFIC to fix-bug. It does NOT appear in implement-feature.
# =============================================================================

[[steps]]
id    = "diagnose"
name  = "diagnose"
title = "Diagnose: root-cause investigation before any code changes"
needs = ["preflight"]
description = """
Identify the root cause of the bug before writing any tests or code.
Model: claude-sonnet-4-6  Effort: high

## Preloaded skills
superpowers:systematic-debugging, superpowers:root-cause-tracing

## Inputs
- Bug description from: bd show {{bead-id}}
- Worktree path: decode worktree-path-* label from molecule

## Decode worktree-path label before any work
  1. Decode: __ → /  then  _u → _
  2. Verify decoded path exists and is a git worktree:
       git -C <path> rev-parse --is-inside-work-tree
  3. Operate from that cwd.

## Actions

1. Reproduce the bug reliably.
   - Find or write a minimal reproduction case.
   - Confirm it fails consistently (not flaky).
   - Note: exact failure (error message, stack trace, wrong output).
   - Note: expected correct behavior.
   If cannot reproduce: flag-human with a note asking for more information.

2. Trace the failure backward to the root cause.
   Apply superpowers:systematic-debugging and superpowers:root-cause-tracing.
   - A symptom is WHERE it breaks. A root cause is WHY it breaks.
   - Do not patch the first place you see the problem — trace further back.
   - Read the code path. Do not assume.
   - Ask: "What invariant was violated? Where was it first violated?"

3. Append root-cause note to step-bead:
   bd update <step-bead-id> --append-notes "Root cause: <explanation>"

4. If root cause significantly differs from the bead description:
   bd label add <step-bead-id> human
   bd label add {{bead-id}} human
   bd update <step-bead-id> --append-notes "Root cause significantly differs: <reason>"
   Exit cleanly. Do NOT proceed.

5. If root cause exceeds the bead's stated scope:
   Apply human-flag protocol. Do NOT fix out-of-scope issues inline.
   File a new bead for the out-of-scope root cause before flagging.

## Definition of Done
Root-cause note appended to step-bead notes. Identified cause is consistent
with the bead's reported symptoms. If root cause exceeds scope: flag-human.

## Idempotent re-entry
Check step-bead notes for existing root-cause note. If present, proceed.
The filesystem state and step-bead notes reflect prior progress; continue from
where the prior pass left off.
"""

# =============================================================================
# Stage: red-tests
# Model: claude-sonnet-4-6  Effort: medium
# cwd: worktree
# =============================================================================

[[steps]]
id    = "red-tests"
name  = "red-tests"
title = "Red-tests: write failing regression test proving the bug"
needs = ["diagnose"]
description = """
Write a failing regression test targeting the root cause (not the symptom).
Model: claude-sonnet-4-6  Effort: medium

## Preloaded skills
superpowers:test-driven-development, superpowers:writing-unit-tests,
superpowers:testing-anti-patterns

## Inputs
- Root-cause note from diagnose step-bead notes
- Bead AC from: bd show {{bead-id}} ([m]-tagged lines)
- Worktree path from: worktree-path-* label on molecule

## Actions

### Hard-escalate + auto-reroute (evaluate FIRST, before any reviewer dispatch)

This step has a canonical escalate predicate. Evaluate at the top of the step:

1. Trigger A — no test runner. If `[gates].test == ""` in project-config.toml,
   the project has no way to run tests:
     red-tests escalate: no test runner ([gates].test=='')

2. Otherwise, proceed with the normal red-tests behavior below.

**Trigger B (no [m] AC bullets) is DELIBERATELY OMITTED on the bug path.**
The fix-bug formula encodes a regression-test invariant: a failing
regression test is "proof that the bug cannot silently return" (see action
5 below). Allowing zero-[m] skip on the bug path — even via auto-reroute —
would silently waive that invariant. A bug bead with zero [m] ACs and a
non-empty [gates].test is a brainstorm gap, not an escalate condition —
the formula must NOT silently skip or reroute; it proceeds with normal
red-tests behavior, and the dispatched bead-implementor will fail loudly
with no [m] lines to cover, surfacing the gap for human resolution.

### Reroute protocol (when Trigger A fires)

The bead is misrouted: a `fix-bug` molecule is running in a project with
no test runner. Auto-reroute to the `docs-only` formula by cloning the
bead — no `human` label, no manual intervention.

1. The trigger note is fixed for fix-bug:
     <trigger-note> = "Trigger A: no test runner"

2. Read the original bead's parent (if any) to preserve epic membership:
       ORIG_PARENT=$(bd show {{bead-id}} --json | jq -r '.[0].parent // empty')

3. Create the new bead as a partial copy of the original:
   - Inherit: `title`, `description`, `acceptance_criteria` from {{bead-id}}.
     Compose the `--description` value as a two-LF-separated string:
       "⚠️ Rerouted from `{{bead-id}}` — formula corrected to `docs-only`."
       (blank line)
       <original description>
     Use `printf '%s\\n\\n%s' "<warning>" "<original>"` or the `$'...\\n\\n...'`
     form to ensure the LFs are real newlines, not literal `\\n` characters.
   - Do NOT inherit `notes` (the new bead starts clean).
   - Preserve epic linkage: if `ORIG_PARENT` is non-empty, pass
     `--parent "$ORIG_PARENT"` so the rerouted-clone remains under the
     same epic.
   - Stamp labels on the new bead: `formula-docs-only`, `implementation-ready`.
   - Do NOT stamp any `implementation-readied-session-*` label.
   - Add a discovered-from edge:
       bd dep add <new-bead-id> {{bead-id}} --type discovered-from

4. Re-parent any open `[h]` follow-up children of the original bead to
   the new bead (so the new bead's verify-ac contract is preserved when
   it inherits `[h]` AC lines):
       for child in $(bd list --parent {{bead-id}} --label human --json \
         | jq -r '.[] | select(.status != "closed") | .id'); do
         bd update "$child" --parent <new-bead-id>
       done

5. Stamp the original bead with the redirect marker:
       bd label add {{bead-id}} REROUTED-TO:<new-bead-id>

6. Append a note to the original bead:
       bd update {{bead-id}} --append-notes "Rerouted to <new-bead-id>. <trigger-note>. New bead created with formula-docs-only and implementation-ready. Run-queue will pick it up in a separate session."

7. Close any merge-gate child of the original bead. Iterate over all
   matches in case duplicates exist:
       bd list --parent {{bead-id}} --label merge-gate --json \
         | jq -r '.[] | select(.status != "closed") | .id' \
         | while read -r merge_child; do
             bd close "$merge_child" --reason "Parent bead rerouted."
           done

8. Close the original bead:
       bd close {{bead-id}} --reason "Rerouted to <new-bead-id> (<trigger-note>)."

9. Append a note to the current step-bead. The literal prefix
   `red-tests escalate: ` is grep-able for verify-ac groundedness and for
   green-loop's defense-in-depth check:
       bd update <step-bead-id> --append-notes "red-tests escalate: <trigger-note>. Cloned to <new-bead-id> with formula-docs-only."

10. Burn the current molecule:
       bd mol burn <mol-id>

After burn, this stage and the entire molecule cease execution. Run-queue
in a separate session will pick up <new-bead-id> organically and pour the
`docs-only` formula on it. No human action required.

### Normal flow (when no escalate trigger fires)

1. Dispatch bead-implementor (sonnet, medium effort) to write the regression test:
   - Test MUST target the root cause location, not the symptom surface.
   - Testing at the wrong layer creates false confidence.
   - Confirm test FAILS in current codebase (bug exists).
   - Commit failing test to feature branch.

2. Run Claude reviewer (test-review skill) on the written test.
   When review-level:none: skip reviewers (test still written).

3. Run Codex adversarial review (gpt-5.5).
   Model from: project-config.toml [foreign-cli].codex_red_tests_model
   When review-level:none: skip.

4. Iteration cap: 2 (override: iteration-cap-red-tests-<n> label).
   At cap with disagreement: record disagreement note.
   Escalate human ONLY if BOTH reviewers agree on critical/major design flaw.

5. The regression test is proof that:
   (a) the bug exists and is reproducible in the test suite
   (b) the fix actually addresses it (when it turns green)
   (c) the bug cannot silently return (regression protection)

## Definition of Done
Failing regression test committed to feature branch. Reviewers approve or
iteration cap reached with disagreement recorded.
OR step rerouted per the Trigger-A-only escalate predicate above: original
bead closed with `REROUTED-TO:<new-id>`, new bead created with
`formula-docs-only` + `implementation-ready`, current molecule burned, and
`red-tests escalate: ...` note appended to step-bead notes.

## Idempotent re-entry
Check filesystem (committed test) and step-bead notes.
"""

# =============================================================================
# Stage: green-loop
# Model: claude-opus-4-7  Effort: medium
# cwd: worktree
# =============================================================================

[[steps]]
id    = "green-loop"
name  = "green-loop"
title = "Green-loop: fix via label-driven RALF dispatch"
needs = ["red-tests"]
description = """
Implement the bug fix using label-driven skill dispatch.
Model: claude-opus-4-7  Effort: medium

## Inputs
- Root-cause note from diagnose step-bead notes
- Bead spec from: bd show {{bead-id}}
- Worktree path from: worktree-path-* label on molecule

## Defense-in-depth (re-evaluate red-tests escalate trigger)

Before any implementation work, re-evaluate the red-tests Trigger A
independently — same logic. (Trigger B is omitted on the bug path; see
red-tests for the regression-test invariant rationale.)

  # Section-body extraction: range pattern /^\\[gates\\]/,/^\\[/ is a no-op
  # (the [gates] header satisfies BOTH boundaries on the same line).
  test_runner=$(awk '/^\\[gates\\]/{flag=1;next} /^\\[/{flag=0} flag' project-config.toml \\
    | awk -F'=' '/^test[[:space:]]*=/{gsub(/[[:space:]"\\047]/,"",$2); print $2}')

If test_runner is empty: this molecule should not have advanced from
red-tests. The trigger note for fix-bug is fixed: "Trigger A: no test
runner". Halt with an explicit human-flag protocol (the literal prefix
`green-loop defense-in-depth:` is grep-able for forensic search,
mirroring the `red-tests escalate:` convention):

  bd label add {{bead-id}} human
  bd label add <step-bead-id> human
  bd update {{bead-id}} --append-notes "green-loop defense-in-depth: red-tests escalate trigger should have fired but molecule advanced. Trigger A: no test runner. Likely manual molecule resume that bypassed reroute."
  bd update <step-bead-id> --append-notes "green-loop defense-in-depth: Trigger A: no test runner. Halted before any RALF dispatch."
  exit

Do NOT proceed with implementation. This path is unreachable in normal
operation (the red-tests reroute burns the molecule before green-loop).
It catches manual molecule resumes that bypass red-tests.

## Dispatch contract

Check the bead's RALF signal before dispatching:

  bd label list {{bead-id}} --json

- If label `ralf:required` is present:
    invoke `ralf-implement` with the root-cause note, bead spec, Definition of Done, relevant context, quality commands, and optional max cycle count from `ralf:cycles=N`

    `ralf-implement` owns only the inner quality loop: iteration,
    independence, adversarial posture, convergence, and structured report output.
    It does not read bead labels or update bead state; this formula step passes
    all needed inputs.

    After it returns, append the structured report summary to the green-loop
    step-bead notes, including cycles run, score, severity counts, and
    foreign-eyes status/degradation for every Codex/Gemini cycle.

    If the score is `FAIL`, or if the score is `PASS_WITH_RESERVATIONS` with
    unresolved major concerns, stop this step: label both the source bead and
    the green-loop step bead `human`, append the unresolved blocking/critical/major
    concerns to both notes, and do not advance to `quality-sweep` until the
    caller explicitly decides whether to revise, defer, or accept the residual risk.

- Otherwise:
    invoke `superpowers:test-driven-development` first,
    then apply `bugfix` plus the appropriate domain/debugging implementation skill.

Record the dispatch decision for audit:

  bd comments add {{bead-id}} "implement-fix: dispatched <skill-name>"

`bd comments add` is non-destructive: it creates a separate comment and does
not replace issue notes. For cumulative step output, use `bd update
--append-notes`; do not use `--notes`, which replaces existing notes.

Persist step output before closing green-loop. Here `<step-bead-id>` is the current green-loop molecule step bead:

  bd update <step-bead-id> --append-notes "IMPLEMENTATION-REPORT: score=<PASS|PASS_WITH_RESERVATIONS|FAIL>; cycles=<n>/<max>; severity=blocking:<n>,critical:<n>,major:<n>,minor:<n>; summary=<summary from dispatched skill>"
  bd update <step-bead-id> --append-notes "FOREIGN-EYES: cycle-1=<COMPLETED|UNAVAILABLE|TIMED_OUT|QUOTA_EXCEEDED|AUTH_FAILED|NO_OUTPUT|UNUSABLE_OUTPUT|NOT_RUN>; cycle-2=<...>; degraded=<list or none>"

Before closing green-loop, ensure the dispatched implementation path has run
and recorded the mandatory completion gate for its own changes:
`quality-reviewer` → `simplify` → `verify-checklist`. If gate evidence is
missing, run it now and append the evidence to the step-bead notes. If any
gate step fails, label both the source bead and step bead `human`, append the
failure evidence to both notes, and do not advance to `quality-sweep`.

## Coverage

Coverage threshold from project-config.toml [coverage].threshold (default 80%),
overridable per-bead via the `coverage-threshold-<n>` label;
honored only when [coverage].applicable is true or absent. When
[coverage].applicable is explicitly false (docs-only repos, config repos, etc.),
coverage is not a quality gate and the threshold is bypassed. See
docs/specs/bead-pipeline-architecture.md §3 (green-loop) for the canonical
contract.

Rules (regardless of dispatched path):
- fix root cause, not just symptom
- minimum viable fix only
- no speculative refactors or unrelated feature work

## Definition of Done
Root cause fixed with regression protection and passing quality gates.

## Idempotent re-entry
Re-check labels and dispatch per current bead state at step start.
"""

# =============================================================================
# Stage: quality-sweep
# Model: claude-haiku-4-5  Effort: medium
# cwd: worktree
# =============================================================================

[[steps]]
id    = "quality-sweep"
name  = "quality-sweep"
title = "Quality-sweep: global quality gate across entire project"
needs = ["green-loop"]
description = """
Run the full project quality suite (not just changed files).
Model: claude-haiku-4-5  Effort: medium

Skippable when preflight marked it so. Also skips when review-level:none.

## Order (fixed)
1. Lint auto-fix: [lint-autofix].command (run FIRST)
2. Build + typecheck + lint (from [gates])
3. Static analysis ([static-analysis])
4. Tests ([gates].test)

ALWAYS end with build + tests after any code changes.

## Coverage

This stage does not separately enforce a coverage threshold; coverage gating,
if any, lives in green-loop's Definition of Done and is conditional on
[coverage].applicable. See docs/specs/bead-pipeline-architecture.md §3
(quality-sweep).

## Definition of Done
All gate commands exit zero (or stage skipped).

## Idempotent re-entry
Re-evaluates state; runs only what is not already green.
"""

# =============================================================================
# Stage: verify-ac
# Model: claude-haiku-4-5  Effort: medium
# cwd: worktree
# =============================================================================

[[steps]]
id    = "verify-ac"
name  = "verify-ac"
title = "Verify-AC: mechanical acceptance criteria validation"
needs = ["quality-sweep"]
description = """
Validate every [m]-tagged AC bullet against worktree state.
Model: claude-haiku-4-5  Effort: medium

Skips when review-level:none.

## Actions

For each [m]-tagged AC line:
1. Dispatch bead-verifier (haiku, low effort) for shell-runnable witnesses.
2. Assemble validation report.

[h]-tagged lines: confirm human follow-up child beads exist.

Run functional/e2e tests from [functional-tests] in project-config.toml.
Failures: create bug bead per failure (label human); continue to create-pr.

Persist validation report to step-bead notes AND source bead notes.

## Definition of Done
Every [m] AC bullet has explicit witness evidence.

## Idempotent re-entry
Re-evaluates; continues from prior pass.
"""

# =============================================================================
# Stage: create-pr
# Model: claude-haiku-4-5  Effort: medium
# cwd: worktree
# =============================================================================

[[steps]]
id    = "create-pr"
name  = "create-pr"
title = "Create-PR: push branch and open pull request"
needs = ["verify-ac"]
description = """
Create the pull request for the bug fix.
Model: claude-haiku-4-5  Effort: medium

## Preloaded skills
superpowers:finishing-a-development-branch

## PR body MUST include
- Bead reference: {{bead-id}} and bead title
- What the bug was (symptom from bead description)
- Root cause (the actual problem, from diagnose step-bead notes)
- How the fix addresses the root cause
- How to verify: reference the regression test by name
- verify-ac validation report
- Bug beads filed during verify-ac (if any)
- Foreign-eyes status section

## Actions
1. Invoke superpowers:finishing-a-development-branch.
2. Stamp pr-url-* label: bd label add <mol-id> pr-url-<encoded-url>

## Idempotent re-entry
If PR exists and OPEN: skip creation, persist URL.
If PR exists and CLOSED: flag-human. Do NOT reopen.
"""

# =============================================================================
# Stage: review-cycle
# Model: claude-sonnet-4-6  Effort: medium
# cwd: worktree
# =============================================================================

[[steps]]
id    = "review-cycle"
name  = "review-cycle"
title = "Review-cycle: address PR review feedback"
needs = ["create-pr"]
description = """
Drive the PR review loop until all review threads are resolved.
Model: claude-sonnet-4-6  Effort: medium

Skips entirely when review-level:none.

## Preloaded skills
superpowers:wait-for-pr-comments (chains to superpowers:reply-and-resolve-pr-threads)

## Actions
Invoke superpowers:wait-for-pr-comments with:
  --mode autonomous --bead-id {{bead-id}}

Iteration cap: 5 (override: iteration-cap-review-cycle-<n> label).
Persist: bd update <step-bead-id> --append-notes "REVIEW-BATCH:<n>/<MAX>"

If PR is CLOSED on re-entry: flag-human.

## Definition of Done
Every review thread has a reply. FIXED items resolved on GitHub.
"""

# =============================================================================
# Stage: merge-or-handoff
# Model: claude-haiku-4-5  Effort: medium
# cwd: repo root
# =============================================================================

[[steps]]
id    = "merge-or-handoff"
name  = "merge-or-handoff"
title = "Merge-or-handoff: auto-merge or hand off to human"
needs = ["review-cycle"]
description = """
Either auto-merge the PR or hand off to the human.
Model: claude-haiku-4-5  Effort: medium

## Gate 1 — PR-state clean-check
All of: zero open Copilot threads, zero open human-author threads, all CI green,
5-minute quiet window. On timeout: NOT clean.

## Auto-merge path (auto-mergeable label present AND clean-check clean)
1. Re-run clean-check immediately before merge.
2. Pour merge-and-cleanup (phase: liquid — NOT vapor).
3. Drive merge-and-cleanup: merge PR, delete branch, remove worktree, I2 close-walk.
   Gate 2 inside merge-and-cleanup blocks until all [h] children are closed
   with verified-by-human label, then closes merge-{source-id} after merge +
   cleanup so the source bead can close.

## Hand-off path (default)
1. bd update {{bead-id}} --status open
2. bd label add {{bead-id}} merge-ready
   bd label add {{bead-id}} human

## Idempotent re-entry
Check gh pr view --json mergedAt. If non-null: skip merge, proceed to cleanup.
"""
