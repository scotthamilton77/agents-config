[project]
name = "installer"
version = "0.1.0"
description = "Install agent configurations for AI coding assistants."
requires-python = ">=3.11"
dependencies = ["pyyaml", "tomli-w", "rich"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/installer"]

[dependency-groups]
dev = [
  "pytest",
  "pytest-xdist",
  "pytest-cov",
  "ruff",
  "mypy",
  "types-PyYAML",
  "actionlint-py",
  "pip-audit",
]


[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E", "W", "F",
  "I",
  "B",
  "UP",
  "SIM",
  "S",
  "RET", "ARG", "PTH",
  "TRY",
  "RUF",
  "N",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

[tool.ruff.format]
docstring-code-format = true

[tool.mypy]
strict = true
warn_unreachable = true
disallow_any_decorated = true
enable_error_code = ["redundant-expr", "truthy-bool", "possibly-undefined"]

[tool.coverage.run]
branch = true
source = ["src/installer"]
omit = ["src/installer/__main__.py"]

[tool.coverage.report]
fail_under = 90
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "@overload"]
show_missing = true
skip_covered = true
