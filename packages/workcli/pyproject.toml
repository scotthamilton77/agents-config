[project]
name = "workcli"
version = "0.1.0"
description = "work — facade CLI quarantining the issue-tracker backend (bd) behind a stable contract."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
work = "workcli.cli:entry"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workcli"]

[dependency-groups]
dev = [
  "pytest",
  "pytest-xdist",
  "pytest-cov",
  "ruff",
  "mypy",
  "pip-audit",
  "jsonschema",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E", "W", "F",
  "I",
  "B",
  "UP",
  "SIM",
  "S",
  "RET", "ARG", "PTH",
  "TRY",
  "RUF",
  "N",
]

[tool.ruff.lint.per-file-ignores]
# S101: pytest's `assert` is the standard assertion mechanism, not a stray
# debug check. TRY003: fakes' loud-failure diagnostics (ScriptedBdRunner's
# script-mismatch/exhaustion messages) need to be specific and self-contained
# for whoever reads the test failure, same rationale as parse.py's drift alarm.
"tests/**" = ["S101", "TRY003"]
"src/workcli/adapters/bd/runner.py" = ["S603", "S607"]
# The drift alarm's entire value is a specific, self-contained message naming
# what bd's shape violated (spec §4 "detail carries ... what failed") -- that
# is the opposite of the generic "call a message-builder" TRY003 wants.
"src/workcli/adapters/bd/parse.py" = ["TRY003"]
# dep_mutate's impossible-op ValueError needs the actual `op!r` inline --
# it's a contract-violation diagnostic (Finding 2), same specificity
# rationale as parse.py's drift alarm above.
"src/workcli/adapters/bd/backend.py" = ["TRY003"]
# Every E_NOT_CONFIGURED message must name the specific config problem and
# path inline (spec §3: "a message naming the specific problem") -- same
# specificity rationale as parse.py's drift alarm above.
"src/workcli/config.py" = ["TRY003"]

[tool.ruff.format]
docstring-code-format = true

[tool.pytest.ini_options]
# The default collection (make test-workcli / cov-workcli invoke pytest with no
# path arg) is the hermetic unit suite only. The real-bd integration suite is
# invoked by explicit path in `make itest-workcli` (which overrides testpaths)
# and must never enter the coverage-gated run.
testpaths = ["tests/unit"]

[tool.mypy]
strict = true
warn_unreachable = true
disallow_any_decorated = true
enable_error_code = ["redundant-expr", "truthy-bool", "possibly-undefined"]

[tool.coverage.run]
branch = true
source = ["src/workcli"]

[tool.coverage.report]
fail_under = 90
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "@overload"]
show_missing = true
skip_covered = true
