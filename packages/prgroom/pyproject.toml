[project]
name = "prgroom"
version = "0.1.0"
description = "prgroom — deterministic PR-grooming CLI that replaces the wait-for-pr-comments and reply-and-resolve-pr-threads skills."
requires-python = ">=3.11"
dependencies = ["typer"]

[project.scripts]
prgroom = "prgroom.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prgroom"]

[dependency-groups]
dev = [
  "pytest",
  "pytest-xdist",
  "pytest-cov",
  "ruff",
  "mypy",
  "pip-audit",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E", "W", "F",
  "I",
  "B",
  "UP",
  "SIM",
  "S",
  "RET", "ARG", "PTH",
  "TRY",
  "RUF",
  "N",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]
# Every verb in cli.py is a foundation skeleton: the typer arguments are
# load-bearing (they shape `--help` and the parse surface) but the body
# intentionally ignores them until the lifecycle lands. ARG001 would fire on
# all 12 verbs with one identical rationale, so it is scoped off here.
"src/prgroom/cli.py" = ["ARG001"]

[tool.ruff.format]
docstring-code-format = true

[tool.mypy]
strict = true
warn_unreachable = true
disallow_any_decorated = true
enable_error_code = ["redundant-expr", "truthy-bool", "possibly-undefined"]

[tool.coverage.run]
branch = true
source = ["src/prgroom"]

[tool.coverage.report]
fail_under = 90
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "@overload"]
show_missing = true
skip_covered = true
