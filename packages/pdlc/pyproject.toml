[project]
name = "pdlc"
version = "0.1.0"
description = "PDLC Orchestrator — the deterministic FSM engine that drives Objectives from CANDIDATE_UOW to a terminal lifecycle stage."
requires-python = ">=3.11"
dependencies = ["pyyaml"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pdlc"]

[dependency-groups]
dev = [
  "pytest",
  "pytest-xdist",
  "pytest-cov",
  "ruff",
  "mypy",
  "types-PyYAML",
  # The Scenario-1 integration test wires the orchestrator to its peer
  # subsystem. Holding Place is a *test/dev* dependency only — the
  # orchestrator never imports it at runtime (the peer seam is the
  # WorkTracker port the Holding Place calls inbound, not an outbound
  # import). See ADR-0001.
  "holding-place",
]

[tool.uv.sources]
holding-place = { path = "../holding-place", editable = true }

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E", "W", "F",
  "I",
  "B",
  "UP",
  "SIM",
  "S",
  "RET", "ARG", "PTH",
  "TRY",
  "RUF",
  "N",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

[tool.ruff.format]
docstring-code-format = true

[tool.mypy]
strict = true
warn_unreachable = true
disallow_any_decorated = true
enable_error_code = ["redundant-expr", "truthy-bool", "possibly-undefined"]

[tool.coverage.run]
branch = true
source = ["src/pdlc"]

[tool.coverage.report]
fail_under = 85
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "@overload"]
show_missing = true
skip_covered = true
