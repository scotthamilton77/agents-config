const KNOWN_STATUSES = [
  "queued", "in-progress", "pr-open", "in-review",
  "merged", "done", "blocked", "waiting-human", "standing-down"
];

// Longest-first so "in-progress" doesn't lose to a shorter prefix match.
const KNOWN_STATUSES_BY_LENGTH = KNOWN_STATUSES.slice().sort((a, b) => b.length - a.length);

function badgeClass(status) {
  const norm = String(status || "").toLowerCase();
  const hit = KNOWN_STATUSES_BY_LENGTH.find(s => norm.startsWith(s));
  return hit ? "badge-" + hit : "badge-queued";
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// Explicit url wins; otherwise derive from the repo slug; otherwise no link.
// State is machine-written but its strings carry external text (PR titles,
// review comments), so an explicit url is scheme-checked before it reaches an
// href — entity-escaping alone leaves a `javascript:` URL clickable.
function safeHref(url) {
  try {
    const scheme = new URL(url, "https://github.com").protocol;
    return (scheme === "https:" || scheme === "http:") ? url : null;
  } catch (e) {
    return null;
  }
}

function prUrl(pr, repo) {
  if (!pr) return null;
  if (typeof pr.url === "string" && pr.url.trim() !== "") {
    const safe = safeHref(pr.url.trim());
    if (safe) return safe;
    // Explicit url rejected — fall through to derivation rather than drop the link.
  }
  if (repo) return "https://github.com/" + repo + "/pull/" + pr.number;
  return null;
}

function prCell(pr, repo) {
  if (!pr) return '<span class="pr-plain">—</span>';
  const url = prUrl(pr, repo);
  const label = "#" + escapeHtml(pr.number);
  return url
    ? `<a class="pr-link" href="${escapeHtml(url)}" target="_blank" rel="noopener">${label}</a>`
    : `<span class="pr-plain">${label}</span>`;
}

// Round count is the signal separating a working reviewer from a looping one.
function reviewBadges(review) {
  if (!review) return "";
  const kind = escapeHtml(review.kind || "review");
  const round = Number(review.round) || 0;
  const stale = review.stalemate ? " stalemate" : "";
  let out = `<span class="badge badge-round${stale}">${kind} · round ${round}</span>`;
  if (typeof review.open_threads === "number" && review.open_threads > 0) {
    out += `<span class="badge badge-threads">${review.open_threads} open</span>`;
  }
  return out;
}

function renderLanes(state) {
  const lanesEl = document.getElementById("lanes");
  lanesEl.innerHTML = "";
  (state.lanes || []).forEach(lane => {
    const card = document.createElement("div");
    const laneStatus = String(lane.status || "").toLowerCase();
    card.className = "card" + (laneStatus === "done" ? " lane-done" : "");

    const rows = (lane.queue || []).map(q => {
      const note = q.note ? `<span class="item-note">${escapeHtml(q.note)}</span>` : "";
      return `<tr>
        <td>${escapeHtml(q.item)}${note}</td>
        <td><span class="badge ${badgeClass(q.status)}">${escapeHtml(q.status)}</span>${reviewBadges(q.review)}</td>
        <td>${prCell(q.pr, state.repo)}</td>
      </tr>`;
    }).join("");

    const events = (lane.events || []).slice(-8).reverse().map(e =>
      `<li><span class="ts">${escapeHtml(e.ts)}</span>${escapeHtml(e.text)}</li>`
    ).join("");

    card.innerHTML = `
      <div class="card-head">
        <h3>${escapeHtml(lane.name)}</h3>
        <span class="badge ${badgeClass(lane.status)}">${escapeHtml(lane.status || "queued")}</span>
      </div>
      <div class="agent-line"><span class="agent-name">${escapeHtml(lane.agent)}</span> — ${escapeHtml(lane.activity || "idle")}</div>
      <table>
        <thead><tr><th>Item</th><th>Status</th><th>PR</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="events">
        <h4>Recent events</h4>
        <ul class="event-log">${events}</ul>
      </div>
    `;
    lanesEl.appendChild(card);
  });
}

function renderLedgers(state) {
  const merged = state.merged || [];
  document.getElementById("merged-count").textContent = merged.length;
  document.getElementById("merged-body").innerHTML = merged.length
    ? `<table><thead><tr><th>PR</th><th>Title</th><th>SHA</th></tr></thead><tbody>` +
      merged.map(m => `<tr>
        <td>${prCell({ number: m.pr, url: m.url || null }, state.repo)}</td>
        <td>${escapeHtml(m.title || "")}</td>
        <td class="pr-plain">${escapeHtml(m.sha || "—")}</td>
      </tr>`).join("") + `</tbody></table>`
    : `<div class="empty">Nothing merged yet.</div>`;

  const closed = state.closed || [];
  document.getElementById("closed-count").textContent = closed.length;
  document.getElementById("closed-body").innerHTML = closed.length
    ? `<table><thead><tr><th>Item</th><th>Title</th><th>PR</th></tr></thead><tbody>` +
      closed.map(c => `<tr>
        <td>${escapeHtml(c.id || "")}</td>
        <td>${escapeHtml(c.title || "")}</td>
        <td>${c.pr ? prCell({ number: c.pr, url: null }, state.repo) : '<span class="pr-plain">—</span>'}</td>
      </tr>`).join("") + `</tbody></table>`
    : `<div class="empty">Nothing closed yet.</div>`;
}

function render(state) {
  document.title = state.title || "Grind — Lane Status";
  document.getElementById("title").textContent = state.title || "Grind — Lane Status";
  document.getElementById("last-generated").textContent =
    "last generated: " + (state.last_generated || "—");

  const bannerEl = document.getElementById("attention-banner");
  const listEl = document.getElementById("attention-list");
  listEl.innerHTML = "";
  if (state.attention && state.attention.length > 0) {
    bannerEl.classList.add("show");
    state.attention.forEach(a => {
      const li = document.createElement("li");
      li.textContent = a;
      listEl.appendChild(li);
    });
  } else {
    bannerEl.classList.remove("show");
  }

  renderLanes(state);
  renderLedgers(state);

  const parkingEl = document.getElementById("parking-list");
  parkingEl.innerHTML = "";
  (state.parking_lot || []).forEach(p => {
    const li = document.createElement("li");
    li.innerHTML = `<span>${escapeHtml(p.item)}</span><span class="note">${escapeHtml(p.note || "")}</span>`;
    parkingEl.appendChild(li);
  });
}

render(STATE);

// --- Auto-refresh control (15s, visible toggle, preference persisted) ---
const REFRESH_SECONDS = 15;
const toggle = document.getElementById("refresh-toggle");
const statusEl = document.getElementById("refresh-status");
let countdown = REFRESH_SECONDS;
let tickTimer = null;

function updateStatusText() {
  statusEl.textContent = toggle.checked ? ("on — " + countdown + "s") : "off";
}

function startTicking() {
  if (tickTimer) clearInterval(tickTimer);
  countdown = REFRESH_SECONDS;
  updateStatusText();
  tickTimer = setInterval(() => {
    countdown -= 1;
    if (countdown <= 0) {
      location.reload();
      return;
    }
    updateStatusText();
  }, 1000);
}

function stopTicking() {
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = null;
  updateStatusText();
}

const savedPref = localStorage.getItem("grind-autorefresh");
toggle.checked = savedPref === null ? true : savedPref === "true";

toggle.addEventListener("change", () => {
  localStorage.setItem("grind-autorefresh", toggle.checked ? "true" : "false");
  if (toggle.checked) startTicking(); else stopTicking();
});

if (toggle.checked) startTicking(); else stopTicking();
