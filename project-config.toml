# project-config.toml
# TODO clean up stale beads references once v2 architecture is in place
# Per-project configuration for the bead pipeline architecture.
# Lives at the repository root. Read by per-stage orchestrators to configure
# quality gates, coverage thresholds, foreign-CLI model selection, and more.
#
# Review/merge policy schema: docs/architecture/review-merge-policy/design.md
# (other sections' schema origin: archive/docs/specs/bead-pipeline-architecture.md)
#
# All sections are optional. Absent sections use per-stage defaults.
# Stage role names (not numbers) are the authority in all section names.

[project]
name            = "agents-config"
default-formula = "implement-feature"  # fallback when no formula-* label on bead

# ---------------------------------------------------------------------------
# [gates] — default quality-gate commands
# Read by: green-loop (quality gate per iteration), quality-sweep
# ---------------------------------------------------------------------------
[gates]
# This project is primarily documentation — no build, typecheck, or lint —
# but it now ships an automated bash smoke-test suite for the skill helper
# scripts under src/user/.agents/skills, src/user/.claude/skills, and
# src/user/.claude/hooks (added by abn9.4). The build/
# typecheck/lint gates remain empty stubs and stages detect them as such and
# skip gracefully; the test gate is wired up to the smoke-test runner.
build     = ""   # no build step
typecheck = ""   # no type checker
lint      = ""   # no linter
test      = "find src/user/.agents/skills src/user/.claude/skills src/user/.claude/hooks -name '*_test.sh' -print0 | sort -z | xargs -0 -I{} sh -c 'echo \"[TEST] $1\"; bash \"$1\" || exit 1' _ {}"   # skill smoke tests (added by abn9.4); null-delimited handles spaces/newlines (find -print0 / sort -z / xargs -0 are common GNU/BSD extensions, not POSIX; portable on macOS + Linux)

# ---------------------------------------------------------------------------
# [coverage] — code coverage settings
# Read by: green-loop, quality-sweep, preflight
# ---------------------------------------------------------------------------
[coverage]
# applicable: explicit opt-out for coverage handling across pipeline stages
# (preflight, green-loop, quality-sweep), intended for projects with no
# coverage tooling (docs-only repos, config repos, etc.). Default is true
# (treated as true when absent). When false:
#   - preflight does NOT fire the human-flag protocol on missing/empty
#     report-location and proceeds to worktree creation;
#   - green-loop's DoD does NOT enforce the coverage threshold;
#   - quality-sweep does not separately enforce a coverage threshold.
# When true (or absent), the existing semantics apply: empty/missing
# report-location triggers human-flag, and green-loop's DoD enforces threshold.
applicable       = false  # smoke tests exist (see [gates].test) but coverage tooling is intentionally not wired up for this docs-leaning repo
threshold        = 80     # percent; ignored when applicable = false; per-bead override: coverage-threshold-<n> label
report-location  = ""     # n/a — applicable = false suppresses coverage handling
format           = ""     # n/a

# ---------------------------------------------------------------------------
# [lint-autofix] — lint auto-fix command
# Read by: quality-sweep (runs BEFORE build/typecheck/lint/test)
# ---------------------------------------------------------------------------
[lint-autofix]
command = ""   # no lint auto-fix for this project

# ---------------------------------------------------------------------------
# [static-analysis] — extra checks (semgrep, depcheck, etc.)
# Read by: quality-sweep
# Absent or all-empty → quality-sweep is skippable (preflight marks it so)
# ---------------------------------------------------------------------------
[static-analysis]
# commands = ["semgrep --config auto ."]   # example; uncomment when needed

# ---------------------------------------------------------------------------
# [functional-tests] — UI/e2e commands
# Read by: verify-ac
# ---------------------------------------------------------------------------
[functional-tests]
# commands = ["playwright test"]   # example; uncomment when needed

# ---------------------------------------------------------------------------
# [review-expectations] — Axis 1: what reviews do we expect (drives polling)
# [merge-policy]        — Axis 2: who is authorized to merge
# Read by: resolve_policy.py (merge-guard skill), consumed by merge-guard and
# wait-for-pr-comments. Schema: docs/architecture/review-merge-policy/design.md
# ---------------------------------------------------------------------------
[review-expectations]
bot-review-expected      = true
bot-reviewers            = ["Copilot", "copilot-pull-request-reviewer[bot]", "chatgpt-codex-connector[bot]"]  # exact identities, never substrings; Codex = Copilot-equivalent (owner directive 2026-07-17), trigger via "@codex review" comment
human-approvers-required = 0     # override per bead: review-exit-human-approvers-<n>

[merge-policy]
# This repo auto-merges on a clean trusted-bot review — a deliberate, named choice.
merge-authorization = "rule-based"
merge-rule          = "bot-quiescence"

[merge-policy.approver]
# Opt-in: a GitHub-App-attested approving review satisfies branch protection's
# required review on authorized autonomous merges. Absent this block, behavior is
# unchanged (resolver -> approver: null). merge-guard runs the approver only
# after the eligibility floor re-clears, pinned to the head SHA, fail-loud to the
# human on any error. Design: docs/specs/2026-07-11-merge-approver-app-design.md
type         = "github-app"
app-id       = 4275336
key-path-env = "MERGE_GUARD_APPROVER_KEY_PATH"  # PEM path; the owner exports this

# ---------------------------------------------------------------------------
# [completion-gate] — tier-routing thresholds for the SKIP/SERIAL/HEAVY gate
# Read by: gate_triage.py (gate-triage skill), consumed by the completion-gate rule.
# All keys optional; omitted or invalid values fail closed to the defaults shown.
# ---------------------------------------------------------------------------
[completion-gate]
heavy_min_files      = 8
heavy_min_loc        = 400
heavy_min_subsystems = 3
trivial_max_loc      = 3   # SKIP ceiling; hard-capped at 20 on load

# ---------------------------------------------------------------------------
# [tracks] / [operating-model] / [extraction] — work-tracker track partition
# Read by: workcli (work create gate, work list --track, work track set,
#          work lint, work graph) and, when they ship, work triggers/groom.
# Contract: docs/specs/2026-07-15-workcli-track-partition-design.md §3
# ---------------------------------------------------------------------------
[tracks]
names = ["installer", "prgroom", "workcli", "pdlc-orchestrator",
         "holding-place", "vizsuite", "review-and-merge",
         "pipeline-discipline", "grind-runtime", "ops-meta"]
organizing-only = ["pipeline-discipline", "grind-runtime", "ops-meta"]
enforcement = "advisory"   # flip to "required" is agents-config-63nm3

[operating-model]
milestone-wip-cap = 2
wip-exempt-milestones = ["agents-config-uxns2"]  # PORT — bead id, never display name
backlog-groom-nag-days = 7
groom-state-bead = ""   # minted by the backfill migration (spec §7)

[extraction.pressure]
max-track-backlog = 100
external-consumer-tracks = []
independent-release-tracks = []

[extraction.eligibility]
max-cross-track-edges = 3

# ---------------------------------------------------------------------------
# [foreign-cli] — foreign-CLI binary paths and model selections
# Read by: red-tests (Codex adversarial test review),
#          green-loop (RALF-IT foreign-eyes iterations),
#          any stage invoking adversarial-codex
# ---------------------------------------------------------------------------
[foreign-cli]
# codex_binary_path              = ""     # default: ${CLAUDE_PLUGIN_ROOT}/scripts/codex-companion.mjs
gemini_binary_path             = "gemini"
codex_red_tests_model            = "gpt-5.6-terra"    # adversarial test review
codex_green_loop_iter1_model     = "gpt-5.6-terra"    # RALF-IT iter 1 implementation review
codex_adversarial_review_model   = "gpt-5.6-sol"          # review-level:deep only
gemini_green_loop_iter2_model    = "gemini-3-flash-preview"
codex_max_concurrent             = 1
gemini_max_concurrent            = 1
