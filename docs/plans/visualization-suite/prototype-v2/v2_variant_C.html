ents-config-qptb4 blocks agents-config-abn9.40.3"},{"id":"e2","from":{"plan":"postfable","step_order":1},"to":{"plan":"prgroom","step_order":4},"kind":"dependency","provenance":"inferred","materializes":"postfable:1","story":"Cost telemetry rides prgroom's per-attempt usage plumbing (usage.py, dispatcher observability abn9.8.26); the ledger bridge lands inside prgroom's dispatch-completion path.","evidence":"cost-telemetry spec, external-deliverables section"},{"id":"e3","from":{"plan":"pdlc","step_order":3},"to":{"plan":"workcli","step_order":2},"kind":"dependency","provenance":"inferred","materializes":"pdlc:3","story":"The orchestrator's WorkTracker protocol needs a bd adapter — workcli's lifecycle layer IS that adapter surface. Building a second one inside pdlc would fork the seam.","evidence":"orchestrator core spec: 'WorkTracker bd adapter — likely overlaps workcli'"},{"id":"e4","from":{"plan":"workcli","step_order":5},"to":{"plan":"prgroom","step_order":6},"kind":"conflict","provenance":"inferred","materializes":"workcli:5","story":"Both steps rewrite the same delivery skills and rules: prgroom's cutover rewires PR-review routing while workcli's migration strips raw bd from the same files. Whoever lands second rebases the other's prose — sequence deliberately.","evidence":"agent-inferred (shared surfaces: skills-shared, skills-claude, rules)"},{"id":"e5","from":{"plan":"reviewloop","step_order":1},"to":{"plan":"prgroom","step_order":4},"kind":"synergy","provenance":"inferred","materializes":"reviewloop:1","story":"prgroom's items[] disposition envelope + reply ledger already record per-finding outcomes — the catch-log could ride that ledger instead of new instrumentation.","evidence":"agent-inferred; reviewloop spec leaves instrumentation storage open (S8.2)"},{"id":"e6","from":{"plan":"workcli","step_order":4},"to":{"plan":"pdlc","step_order":6},"kind":"synergy","provenance":"inferred","materializes":"pdlc:6","story":"work discover and Holding-Place Capture are the same gesture at different maturity — one capture contract could serve both, with discover as the CLI front door.","evidence":"agent-inferred"},{"id":"e7","from":{"plan":"reviewloop","step_order":2},"to":{"plan":"postfable","step_order":4},"kind":"synergy","provenance":"inferred","materializes":"reviewloop:2","story":"Defect-router categories and the cross-model panel's finding classes are one taxonomy; sharing it lets panel verdicts feed calibration data.","evidence":"agent-inferred"},{"id":"e8","from":{"plan":"postfable","step_order":3},"to":{"plan":"prgroom","step_order":4},"kind":"overlap","provenance":"inferred","materializes":"postfable:3","story":"Provider wiring edits prgroom AgentSpec/chain config while prgroom's own P1 wave rewrites the dispatcher — same package, same window.","evidence":"openrouter spec names packages/prgroom surfaces"},{"id":"e9","from":{"plan":"reviewloop","step_order":2},"to":{"plan":"pdlc","step_order":4},"kind":"overlap","provenance":"inferred","materializes":"reviewloop:2","story":"PDLC's Review state defines Mechanical/Advisory/Proposed-Rule finding classes; the defect router is independently defining the same taxonomy while pdlc sleeps. Divergence now is a reconciliation tax later.","evidence":"agent-inferred (CONTEXT.md Finding classes vs review-feedback-loop categories)"},{"id":"e10","from":{"plan":"pdlc","step_order":5},"to":{"plan":"prgroom","step_order":4},"kind":"dependency","provenance":"inferred","materializes":"pdlc:5","story":"Integration Stage A is PR grooming — prgroom's run loop and merge gate are that engine. PDLC should drive prgroom, not reimplement it; depends on the disposition envelope being stable.","evidence":"agent-inferred (CONTEXT.md Integration Stage A vs prgroom scope)"}]};

// ---------- constants ----------
const KIND_GLYPH = { dependency: "→", overlap: "≈", conflict: "✕", synergy: "+" };
const KIND_LABEL = { dependency: "dependency", overlap: "overlap", conflict: "conflict", synergy: "synergy" };
function kindColor(kind) {
  if (kind === "overlap") return "var(--overlap)";
  if (kind === "conflict") return "var(--conflict)";
  if (kind === "synergy") return "var(--synergy)";
  return "var(--ink-dependency)";

const CARD_W = 200, CARD_H = 120;

const ARROW_PAD = 2; // px gap between card boundary and edge endpoint, clears the card stroke
function isParkedPlan(plan) { return /parked/i.test(plan.status); }

// ---------- lookups ----------
const planByKey = new Map(DATA.plans.map(p => [p.key, p]));
const regionByKey = new Map(DATA.regions.map(r => [r.key, r]));

const includedPlans = new Set(DATA.plans.map(p => p.key));
function isPlanIncluded(key) { return includedPlans.has(key); }
let drillPlanKeys = []; // plan key(s) whose content is currently shown in the drill panel

// ---------- build bundles ----------
function pairKey(a, b) { return [a, b].sort().join("|"); }
const bundleMap = new Map();
DATA.edges.forEach(e => {
  const key = pairKey(e.from.plan, e.to.plan) + "::" + e.kind;
  if (!bundleMap.has(key)) {
    bundleMap.set(key, {
      key, pair: pairKey(e.from.plan, e.to.plan),
      kind: e.kind, fromPlan: e.from.plan, toPlan: e.to.plan,
      edges: []
    });
  }
  bundleMap.get(key).edges.push(e);
});
const bundles = Array.from(bundleMap.values());
bundles.forEach(b => {
  b.count = b.edges.length;
  const provs = new Set(b.edges.map(e => e.provenance));
  b.provenance = provs.size > 1 ? "mixed" : Array.from(provs)[0];
  b.minFromOrder = Math.min(...b.edges.map(e => e.from.step_order));
  b.minToOrder = Math.min(...b.edges.map(e => e.to.step_order));
});
// group bundles by pair for curvature fanning
const bundlesByPair = new Map();
bundles.forEach(b => {
  if (!bundlesByPair.has(b.pair)) bundlesByPair.set(b.pair, []);
  bundlesByPair.get(b.pair).push(b);
});
bundlesByPair.forEach(list => {
  const n = list.length;
  list.forEach((b, i) => { b.fanIndex = i; b.fanCount = n; });
});

const nodes = DATA.plans.map((p, i) => {
  const angle = (i / DATA.plans.length) * 2 * Math.PI - Math.PI / 2;

    key: p.key, plan: p,
    x: 600 + 260 * Math.cos(angle),
    y: 380 + 260 * Math.sin(angle)
  };
});
const nodeByKey = new Map(nodes.map(n => [n.key, n]));
const links = Array.from(bundlesByPair.keys()).map(pair => {
  const [a, b] = pair.split("|");
  return { source: a, target: b };

  .force("charge", d3.forceManyBody().strength(-900))
  .force("collide", d3.forceCollide(150))
  .force("center", d3.forceCenter(600, 380).strength(0.06))
  .force("link", d3.forceLink(links).id(d => d.key).distance(330).strength(0.35))
  .stop();

// ---------- geometry helpers ----------
function rectIntersect(cx, cy, w, h, tx, ty) {
  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return [cx, cy];
  const hw = w / 2, hh = h / 2;
  const sx = dx !== 0 ? hw / Math.abs(dx) : Infinity;
  const sy = dy !== 0 ? hh / Math.abs(dy) : Infinity;
  const s = Math.min(sx, sy);
  return [cx + dx * s, cy + dy * s];
}
// card-boundary point, nudged outward by `pad` so a marker anchored here
// (e.g. an arrowhead) clears the card's stroke instead of sitting under it
function offsetToBoundary(cx, cy, w, h, tx, ty, pad) {
  const [bx, by] = rectIntersect(cx, cy, w, h, tx, ty);
  const dx = tx - cx, dy = ty - cy;
  const len = Math.hypot(dx, dy) || 1;
  return [bx + (dx / len) * pad, by + (dy / len) * pad];
}
function rotateVec(dx, dy, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return [dx * c - dy * s, dx * s + dy * c];
}
function quadPoint(p0, p1, p2, t) {
  const mt = 1 - t;
  return [
    mt * mt * p0[0] + 2 * mt * t * p1[0] + t * t * p2[0],
    mt * mt * p0[1] + 2 * mt * t * p1[1] + t * t * p2[1]
  ];
}
function stepSquarePos(node, order) {
  const steps = node.plan.steps;
  const n = steps.length;
  const localX = STRIP_MARGIN + (n > 1 ? ((order - 1) / (n - 1)) * (CARD_W - 2 * STRIP_MARGIN) : (CARD_W - 2 * STRIP_MARGIN) / 2);
  const localY = CARD_H - STRIP_Y_OFFSET;
  return [node.x - CARD_W / 2 + localX, node.y - CARD_H / 2 + localY];
}

// pointerdown/pointerup with a 4px movement threshold separates click
// (open the plan drawer) from drag (reposition the card); no stateful
// first-click arming, no double-click. Card gestures never pan the canvas.
cardG.each(function (d) {
  const el = d3.select(this);
  let downX = 0, downY = 0, dragging = false, dragDX = 0, dragDY = 0;

  el.on("pointerdown", function (event) {
    event.stopPropagation();
    event.preventDefault();
    downX = event.clientX; downY = event.clientY;
    dragging = false;
    const [px, py] = d3.pointer(event, zoomLayer.node());
    dragDX = px - d.x; dragDY = py - d.y;
    this.setPointerCapture(event.pointerId);
  });

  el.on("pointermove", function (event) {
    if (event.buttons !== 1) return;
    if (!dragging) {
      if (Math.hypot(event.clientX - downX, event.clientY - downY) < 4) return;
      dragging = true;
      el.raise();
    }
    event.stopPropagation();
    const [px, py] = d3.pointer(event, zoomLayer.node());
    d.x = px - dragDX; d.y = py - dragDY;
    el.attr("transform", `translate(${d.x - CARD_W / 2},${d.y - CARD_H / 2})`);
    renderEdges();
  });

  el.on("pointerup", function (event) {
    event.stopPropagation();
    if (this.hasPointerCapture(event.pointerId)) this.releasePointerCapture(event.pointerId);
    if (!dragging) openPlanDrill(d.plan);
    dragging = false;
  });

  // silence the native click that always follows pointerup so it can't
  // bubble to the svg's background-click-closes-drawer listener
  el.on("click", (event) => event.stopPropagation());
});

  const g = d3.select(this);
  const steps = d.plan.steps;
  const n = steps.length;
  steps.forEach((step, i) => {
    const localX = STRIP_MARGIN + (n > 1 ? (i / (n - 1)) * (CARD_W - 2 * STRIP_MARGIN) : (CARD_W - 2 * STRIP_MARGIN) / 2);
    const localY = CARD_H - STRIP_Y_OFFSET;
    const color = `var(--plan${d.plan.color_slot})`;
    const sqx = localX - SQ / 2, sqy = localY - SQ / 2;

    if (step.status === "deferred") {
      // parked mark: full-opacity outline circle + centered pause glyph, never dimmed
      g.append("circle")
        .attr("class", "step-sq step-deferred")
        .attr("cx", localX).attr("cy", localY).attr("r", SQ / 2)
        .attr("fill", "none")
        .attr("stroke", color)
        .attr("stroke-width", 1.5);
      g.append("rect")
        .attr("class", "step-pause-bar")
        .attr("x", localX - 2.2).attr("y", localY - 2.5)
        .attr("width", 1.2).attr("height", 5)
        .attr("fill", "var(--text-secondary)");
      g.append("rect")
        .attr("class", "step-pause-bar")
        .attr("x", localX + 1.0).attr("y", localY - 2.5)
        .attr("width", 1.2).attr("height", 5)
        .attr("fill", "var(--text-secondary)");
    } else {
      const strokeOnly = step.status === "open";
      const ringExtra = step.status === "in_progress";
      if (ringExtra) {
        g.append("rect")
          .attr("x", sqx - 3).attr("y", sqy - 3)
          .attr("width", SQ + 6).attr("height", SQ + 6)
          .attr("rx", 2)
          .attr("fill", "none")
          .attr("stroke", color)
          .attr("stroke-width", 1.4)
          .attr("opacity", 0.9);
      }
      g.append("rect")
        .attr("class", "step-sq")
        .attr("x", sqx).attr("y", sqy)
        .attr("width", SQ).attr("height", SQ)
        .attr("rx", 2)
        .attr("fill", strokeOnly ? "none" : color)
        .attr("stroke", color);
    }
    // widened hit target
    g.append("rect")
      .attr("class", "step-hit")
      .attr("x", sqx - 4).attr("y", sqy - 6)
      .attr("width", SQ + 8).attr("height", SQ + 12)
      .on("pointerdown", (event) => event.stopPropagation())
      .on("pointerup", (event) => event.stopPropagation())
      .on("click", (event) => { event.stopPropagation(); openStepDrill(d.plan, step); })
      .on("mouseenter", (event) => showTooltip(`<strong>${escapeHtml(step.label)}</strong><br>step ${step.order} &middot; ${escapeHtml(step.status)}`, event))
      .on("mousemove", moveTooltip)
      .on("mouseleave", hideTooltip);
  });
});

// ---------- render edges (re-run on drag) ----------
function renderEdges() {
  edgeLayer.selectAll("*").remove();
  tickLayer.selectAll("*").remove();
  glyphLayer.selectAll("*").remove();

  bundles.filter(b => isPlanIncluded(b.fromPlan) && isPlanIncluded(b.toPlan)).forEach(b => {
    const nodeA = nodeByKey.get(b.fromPlan);
    const nodeB = nodeByKey.get(b.toPlan);
    const n = b.fanCount, i = b.fanIndex;
    const angleOffset = (i - (n - 1) / 2) * 0.26;
    const curvatureMag = (i - (n - 1) / 2) * 26;

    const dAB = rotateVec(nodeB.x - nodeA.x, nodeB.y - nodeA.y, angleOffset);
    const startPt = offsetToBoundary(nodeA.x, nodeA.y, CARD_W, CARD_H, nodeA.x + dAB[0], nodeA.y + dAB[1], ARROW_PAD);
    const dBA = rotateVec(nodeA.x - nodeB.x, nodeA.y - nodeB.y, -angleOffset);
    const endPt = offsetToBoundary(nodeB.x, nodeB.y, CARD_W, CARD_H, nodeB.x + dBA[0], nodeB.y + dBA[1], ARROW_PAD);

    const mid = [(startPt[0] + endPt[0]) / 2, (startPt[1] + endPt[1]) / 2];
    const dx = endPt[0] - startPt[0], dy = endPt[1] - startPt[1];
    const len = Math.hypot(dx, dy) || 1;
    const perp = [-dy / len, dx / len];
    const control = [mid[0] + perp[0] * curvatureMag, mid[1] + perp[1] * curvatureMag];

    const color = kindColor(b.kind);
    const dashed = b.provenance !== "encoded";
    const strokeW = Math.min(8, Math.log(1 + b.count) * 2.5);

    const path = `M${startPt[0]},${startPt[1]} Q${control[0]},${control[1]} ${endPt[0]},${endPt[1]}`;

    edgeLayer.append("path")
      .attr("class", "bundle-path")
      .attr("d", path)
      .attr("stroke", color)
      .attr("stroke-width", strokeW)
      .attr("stroke-dasharray", dashed ? "6,4" : null)
      .attr("opacity", 0.9)
      .attr("marker-end", `url(#arrow-${b.kind})`);

    edgeLayer.append("path")
      .attr("class", "bundle-hit")
      .attr("d", path)
      .on("click", (event) => { event.stopPropagation(); openBundleDrill(b); })
      .on("mouseenter", (event) => showTooltip(
        `<strong>${escapeHtml(planByKey.get(b.fromPlan).label)} ↔ ${escapeHtml(planByKey.get(b.toPlan).label)}</strong><br>${escapeHtml(KIND_LABEL[b.kind])} ×${b.count} &middot; ${escapeHtml(b.provenance)}`, event))
      .on("mousemove", moveTooltip)
      .on("mouseleave", hideTooltip);

    // anchor ticks -> earliest-step square on each side
    const fromSq = stepSquarePos(nodeA, b.minFromOrder);
    const toSq = stepSquarePos(nodeB, b.minToOrder);
    tickLayer.append("line")
      .attr("class", "anchor-tick")
      .attr("x1", startPt[0]).attr("y1", startPt[1])
      .attr("x2", fromSq[0]).attr("y2", fromSq[1])
      .attr("stroke", color).attr("stroke-dasharray", dashed ? "3,3" : null).attr("opacity", 0.5);
    tickLayer.append("line")
      .attr("class", "anchor-tick")
      .attr("x1", endPt[0]).attr("y1", endPt[1])
      .attr("x2", toSq[0]).attr("y2", toSq[1])
      .attr("stroke", color).attr("stroke-dasharray", dashed ? "3,3" : null).attr("opacity", 0.5);

    // midpoint glyph badge (chip form) + count
    const gp = quadPoint(startPt, control, endPt, 0.5);
    const glyphGroup = glyphLayer.append("g").attr("class", "bundle-glyph-group");
    const glyphTooltip = `<strong>${escapeHtml(KIND_LABEL[b.kind])}</strong> ${escapeHtml(KIND_GLYPH[b.kind])} &middot; ${b.count} edge${b.count > 1 ? "s" : ""}${b.provenance === "mixed" ? " (mixed provenance)" : ""}`;
    // enlarged invisible click target (>=18px) — playwright/users click the badge, not the curve
    glyphGroup.append("rect")
      .attr("class", "bundle-glyph-hit")
      .attr("x", gp[0] - 11).attr("y", gp[1] - 11)
      .attr("width", 22).attr("height", 22)
      .attr("fill", "transparent")
      .attr("pointer-events", "all")
      .style("cursor", "pointer")
      .on("click", (event) => { event.stopPropagation(); openBundleDrill(b); })
      .on("mouseenter", (event) => showTooltip(glyphTooltip, event))
      .on("mousemove", moveTooltip)
      .on("mouseleave", hideTooltip);
    // visible chip: rounded rect ~18x14, kind color fill, white glyph
    glyphGroup.append("rect")
      .attr("class", "bundle-glyph-bg")
      .attr("x", gp[0] - 9).attr("y", gp[1] - 7)
      .attr("width", 18).attr("height", 14)
      .attr("rx", 4)
      .attr("fill", color)
      .attr("stroke", "var(--chip-stroke)").attr("stroke-width", 1.25)
      .attr("pointer-events", "none");
    glyphGroup.append("text")
      .attr("class", "bundle-glyph-text")
      .attr("x", gp[0]).attr("y", gp[1] + 1)
      .attr("fill", "#fff")
      .attr("pointer-events", "none")
      .text(KIND_GLYPH[b.kind]);
    glyphLayer.append("text")
      .attr("class", "bundle-count-text")
      .attr("x", gp[0]).attr("y", gp[1] + 20)
      .text(`→ ${b.count}`);
  });

  // keep cards above edges
  cardLayer.raise();
}

}

// ---------- drill panel ----------
const drillPanel = d3.select("#drillPanel");
const drillContent = d3.select("#drillContent");

function closeDrill() {
  drillPanel.classed("open", false);
  drillPlanKeys = [];
  setTimeout(() => drillPanel.classed("hidden-panel", true), 150);
}
function openDrillPanel() {
  drillPanel.classed("hidden-panel", false);
  requestAnimationFrame(() => drillPanel.classed("open", true));
}
d3.select("#drillClose").on("click", closeDrill);
d3.select("#graph").on("click", closeDrill);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDrill(); });

function openBundleDrill(b) {
  drillPlanKeys = [b.fromPlan, b.toPlan];
  drillContent.selectAll("*").remove();
  const fromP = planByKey.get(b.fromPlan), toP = planByKey.get(b.toPlan);
  drillContent.append("h2").text(`${fromP.label} ↔ ${toP.label}`);
  drillContent.append("p").attr("class", "meta-line")
    .text(`${KIND_LABEL[b.kind]} × ${b.count} · provenance: ${b.provenance}`);
  drillContent.append("h4").text("Underlying edges");
  b.edges.forEach(e => {
    const box = drillContent.append("div").attr("class", "edge-entry");
    box.append("div").attr("class", "kind-tag").style("color", kindColor(e.kind)).text(`${KIND_GLYPH[e.kind]} ${KIND_LABEL[e.kind]}`);
    box.append("p").attr("class", "meta-line")
      .text(`${e.from.plan}:${e.from.step_order} → ${e.to.plan}:${e.to.step_order}  ·  provenance: ${e.provenance}`);
    box.append("p").attr("class", "meta-line").text(`materializes at ${e.materializes}`);
    box.append("p").text(e.story);
    box.append("p").attr("class", "meta-line").text(`evidence: ${e.evidence}`);
    const fromStep = planByKey.get(e.from.plan).steps.find(s => s.order === e.from.step_order);
    const toStep = planByKey.get(e.to.plan).steps.find(s => s.order === e.to.step_order);
    const regions = new Set([...(fromStep ? fromStep.surfaces : []), ...(toStep ? toStep.surfaces : [])]);
    const chipsWrap = box.append("div");
    chipsWrap.append("span").attr("class", "meta-line").text("regions: ");
    Array.from(regions).forEach(rk => {
      const r = regionByKey.get(rk);
      chipsWrap.append("span").attr("class", "chip").text(r ? r.label : rk);
    });
  });
  openDrillPanel();
}

function openPlanDrill(plan) {
  drillPlanKeys = [plan.key];
  drillContent.selectAll("*").remove();
  drillContent.append("h2").text(plan.label);
  drillContent.append("p").attr("class", "meta-line").text(`status: ${plan.status}`);
  drillContent.append("p").attr("class", "meta-line").text(`beads: ${plan.counts.closed} closed · ${plan.counts.open} open`);

  const inKinds = {}, outKinds = {};
  bundles.forEach(b => {
    if (b.toPlan === plan.key) b.edges.forEach(e => { if (e.to.plan === plan.key) inKinds[b.kind] = (inKinds[b.kind] || 0) + 1; });
    if (b.fromPlan === plan.key) b.edges.forEach(e => { if (e.from.plan === plan.key) outKinds[b.kind] = (outKinds[b.kind] || 0) + 1; });
  });
  drillContent.append("h4").text("Edge counts by kind");
  const countsWrap = drillContent.append("p");
  ["dependency", "overlap", "conflict", "synergy"].forEach(k => {
    const total = (inKinds[k] || 0) + (outKinds[k] || 0);
    if (total > 0) countsWrap.append("span").attr("class", "chip").text(`${KIND_GLYPH[k]} ${k}: ${total}`);
  });

  drillContent.append("h4").text("Steps");
  plan.steps.forEach(s => {
    const box = drillContent.append("div").attr("class", "edge-entry");
    box.append("p").text(`${s.order}. ${s.label}`);
    box.append("p").attr("class", "meta-line").text(`status: ${s.status}`);
    const chipsWrap = box.append("div");
    s.surfaces.forEach(rk => {
      const r = regionByKey.get(rk);
      chipsWrap.append("span").attr("class", "chip").text(r ? r.label : rk);
    });
  });
  openDrillPanel();
}

function openStepDrill(plan, step) {
  drillPlanKeys = [plan.key];
  drillContent.selectAll("*").remove();
  drillContent.append("h2").text(step.label);
  drillContent.append("p").attr("class", "meta-line").text(`plan: ${plan.label}`);
  drillContent.append("p").attr("class", "meta-line").text(`order: ${step.order} · status: ${step.status}`);
  if (step.note) drillContent.append("p").text(step.note);
  drillContent.append("h4").text("Surfaces");
  const chipsWrap = drillContent.append("div");
  step.surfaces.forEach(rk => {
    const r = regionByKey.get(rk);
    chipsWrap.append("span").attr("class", "chip").text(r ? r.label : rk);
  });

  const related = DATA.edges.filter(e =>
    (e.from.plan === plan.key && e.from.step_order === step.order) ||
    (e.to.plan === plan.key && e.to.step_order === step.order));
  if (related.length) {
    drillContent.append("h4").text("Related cross-plan edges");
    related.forEach(e => {
      const box = drillContent.append("div").attr("class", "edge-entry");
      box.append("div").attr("class", "kind-tag").style("color", kindColor(e.kind)).text(`${KIND_GLYPH[e.kind]} ${KIND_LABEL[e.kind]}`);
      box.append("p").attr("class", "meta-line").text(`${e.from.plan}:${e.from.step_order} → ${e.to.plan}:${e.to.step_order}`);
      box.append("p").text(e.story);
    });
  }
  openDrillPanel();
}

// ---------- header / dark toggle / misc ----------
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
}
d3.select("#headerTitle").text("Variant C — Plan Constellation");
d3.select("#headerQuestion").text(DATA.meta.question);

d3.select("#darkToggle").on("click", function () {
  const html = d3.select(document.documentElement);
  const isDark = html.classed("dark");
  html.classed("dark", !isDark);
  d3.select(this).text(isDark ? "Dark mode" : "Light mode");
});
</script>
